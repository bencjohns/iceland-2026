                          <div className="flex items-center gap-2 mb-2">
                            <span className="w-8 h-8 rounded-full bg-teal text-white flex items-center justify-center text-sm font-bold">
                              {name[0]}
                            </span>
                            <span className="font-display font-bold text-[#1A1A1A]">{name}</span>
                            {name === currentUser && <span className="text-[10px] text-teal font-medium">(you)</span>}
                          </div>
                          {draftCount > 0 ? (
                            <div className="text-xs text-gray-500">
                              <span className="text-teal font-semibold">{draftCount} draft{draftCount !== 1 ? 's' : ''}</span>
                            </div>
                          ) : (
                            <div className="text-xs text-gray-400">No drafts yet</div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </>
              ) : (
                /* Viewing a person's drafts */
                <div>
                  <div className="flex items-center gap-4 mb-6">
                    <button onClick={() => { setViewingDraftsFor(null); setExpandedDraft(null); }}
                      className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 text-sm font-bold">←</button>
                    <div className="flex-1">
                      <h3 className="font-display text-xl font-bold text-[#1A1A1A]">{viewingDraftsFor}'s Plans</h3>
                      <p className="text-sm text-gray-400">
                        {viewingDraftsFor === currentUser ? 'Your saved trip plans' : `Viewing ${viewingDraftsFor}'s trip plans`}
                      </p>
                    </div>
                    {viewingDraftsFor === currentUser && Object.keys(getDraftsFor(currentUser)).length < 5 && (
                      <button onClick={() => onCreateDraft()}
                        className="px-4 py-2 rounded-lg bg-teal text-white text-sm font-medium hover:bg-teal-dark transition-all">
                        + New Draft
                      </button>
                    )}
                  </div>
                  <div className="space-y-3">
                    {Object.entries(getDraftsFor(viewingDraftsFor)).map(([draftId, draft]) => {
                      const stopCount = getDraftStopCount(draft);
                      const dayCount = draft.dayCount || 1;
                      const allStops = getDraftAllStops(draft);
                      const region = allStops.length > 0 ? getRegionForStops(allStops) : null;
                      const isActive = draftId === (tripDrafts[viewingDraftsFor] || {}).activeDraftId;
                      const isExpanded = expandedDraft === draftId;
                      return (
                        <div key={draftId} className={`bg-white rounded-xl border overflow-hidden ${isActive ? 'border-teal/40' : 'border-gray-100'}`}>
                          {/* Draft header */}
                          <div className="flex items-center gap-3 p-4 cursor-pointer hover:bg-gray-50 transition-colors"
                            onClick={() => { setExpandedDraft(isExpanded ? null : draftId); setExpandedDraftStops({}); setAllDraftStopsExpanded(false); }}>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2">
                                <span className="font-display font-bold text-[#1A1A1A]">{draft.title || 'Untitled'}</span>
                                {isActive && <span className="text-[10px] font-semibold text-teal bg-teal-50 px-2 py-0.5 rounded-full">Active</span>}
                              </div>
                              <div className="text-[11px] text-gray-400 mt-0.5 flex flex-wrap gap-x-3">
                                <span>{stopCount} stop{stopCount !== 1 ? 's' : ''} across {dayCount} day{dayCount !== 1 ? 's' : ''}</span>
                                {region && <span>📍 {region}</span>}
                                {draft.updatedAt && <span>Updated {formatRelativeTime(draft.updatedAt)}</span>}
                              </div>
                            </div>
                            <span className={`text-gray-400 text-xs transition-transform ${isExpanded ? 'rotate-90' : ''}`}>▶</span>
                          </div>
                          {/* Expanded draft days */}
                          {isExpanded && (
                            <div className="border-t border-gray-100 p-4 space-y-4" style={{ animation: 'fadeInUp 0.2s ease-out' }}>
                              <div className="flex flex-wrap gap-2 mb-2">
                                {viewingDraftsFor === currentUser && (
                                  <>
                                    {!isActive && (
                                      <button onClick={() => onSetActiveDraft(draftId)}
                                        className="px-3 py-1.5 rounded-lg text-xs font-medium bg-teal text-white hover:bg-teal-dark transition-all">
                                        Set as Active
                                      </button>
                                    )}
                                    <button onClick={() => {
                                      const newName = prompt('Rename draft:', draft.title);
                                      if (newName && newName.trim()) onRenameDraft(draftId, newName.trim());
                                    }}
                                      className="px-3 py-1.5 rounded-lg text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">
                                      Rename
                                    </button>
                                    {Object.keys(getDraftsFor(currentUser)).length > 1 && (
                                      <button onClick={() => { if (confirm('Delete "' + draft.title + '"?')) onDeleteDraft(draftId); }}
                                        className="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-50 text-red-500 hover:bg-red-100 transition-all">
                                        Delete
                                      </button>
                                    )}
                                  </>
                                )}
                                {stopCount > 0 && (
                                  <button onClick={() => {
                                    if (allDraftStopsExpanded) {
                                      setExpandedDraftStops({});
                                      setAllDraftStopsExpanded(false);
                                    } else {
                                      const all = {};
                                      getDraftAllStops(draft).forEach(id => { all[id] = true; });
                                      setExpandedDraftStops(all);
                                      setAllDraftStopsExpanded(true);
                                    }
                                  }}
                                    className="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 text-gray-500 hover:bg-teal-50 hover:text-teal hover:border-teal/30 transition-all ml-auto">
                                    {allDraftStopsExpanded ? '⊟ Collapse All' : '⊞ Expand All'}
                                  </button>
                                )}
                              </div>
                              {Array.from({ length: dayCount }, (_, i) => i + 1).map(dayNum => {
                                const dayStops = (draft.days && draft.days[dayNum] && draft.days[dayNum].stops) || [];
                                const dayRegion = dayStops.length > 0 ? getRegionForStops(dayStops) : null;
                                return (
                                  <div key={dayNum}>
                                    <div className="flex items-center gap-2 mb-2">
                                      <span className="w-7 h-7 rounded-full bg-teal text-white flex items-center justify-center text-xs font-bold">
                                        {dayNum}
                                      </span>
                                      <span className="font-display font-bold text-lg">Day {dayNum}</span>
                                      {dayRegion && <span className="text-[11px] text-gray-400">📍 {dayRegion}</span>}
                                    </div>
                                    {dayStops.length === 0 ? (
                                      <div className="text-xs text-gray-400 pl-8 py-2">No stops</div>
                                    ) : (
                                      <div className="space-y-0 pl-2">
                                        {dayStops.map((cardId, idx) => {
                                          const card = findCard(cardId);
                                          if (!card) return null;
                                          const img = (IMAGE_URLS[card.id] || [])[0];
                                          const isStopExpanded = expandedDraftStops[cardId];
                                          return (
                                            <div key={cardId}>
                                              <div className={`rounded-lg border ${isStopExpanded ? 'border-teal/30 shadow-sm bg-white' : 'border-transparent hover:bg-gray-50'} transition-all`}>
                                                <div className="flex items-center gap-3 p-2 cursor-pointer"
                                                  onClick={() => setExpandedDraftStops(prev => ({ ...prev, [cardId]: !prev[cardId] }))}>
                                                  {img && <img src={img.url} alt={card.name} className="w-10 h-10 rounded-lg object-cover shrink-0" loading="lazy" />}
                                                  <span className="text-sm shrink-0">{getCategoryIcon(card.category)}</span>
                                                  <div className="flex-1 min-w-0">
                                                    <div className="font-semibold text-sm text-[#1A1A1A] hover:text-teal transition-colors">{card.name}</div>
                                                    <div className="text-[11px] text-gray-400">{card.timeNeeded} · {card.costDisplay}</div>
                                                  </div>
                                                  <span className={`text-gray-400 text-xs transition-transform shrink-0 ${isStopExpanded ? 'rotate-90' : ''}`}>▶</span>
                                                </div>
                                                {isStopExpanded && (
                                                  <div className="px-3 pb-3 pt-1 border-t border-gray-100" style={{ animation: 'fadeInUp 0.2s ease-out' }}>
                                                    <ImageCarousel images={card.images} cardId={card.id} />
                                                    <p className="text-sm text-gray-600 leading-relaxed mt-3">{card.description}</p>
                                                    <div className="mt-3 space-y-1 text-xs text-gray-500">
                                                      <div className="flex items-center gap-2">
                                                        <span className={`font-medium px-2 py-0.5 rounded-full ${getCostTierStyle(card.costTier).bg}`}>
                                                          {getCostTierLabel(card.costTier)} {card.costDisplay}
                                                        </span>
                                                        <span className={`px-2 py-0.5 rounded-full ${getTierBadge(card.tier).cls}`}>{getTierBadge(card.tier).label}</span>
                                                      </div>
                                                      <div className="flex flex-wrap gap-x-4 gap-y-1">
                                                        <span>⏱ {card.timeNeeded}</span>
                                                        {card.parkingCost && <span>🅿️ {card.parkingCost}</span>}
                                                        {card.driveFromPrevious && <span>📍 {card.driveFromPrevious}</span>}
                                                        {(() => { const hd = getHomeBaseDriveInfo(card.id, homeBase); return hd && hd.km > 1 ? (
                                                          <span className="text-gray-300">🏠 {hd.label} from {homeBase || 'Reykjavik'}</span>
                                                        ) : null; })()}
                                                      </div>
                                                      {card.bookAheadLabel && <div>📅 {card.bookAheadLabel}</div>}
                                                      {card.bookingUrl && (
                                                        <div><a href={card.bookingUrl} target="_blank" rel="noopener noreferrer" className="text-teal hover:underline">🔗 Book at {card.bookingSiteName || card.bookingUrl}</a></div>
                                                      )}
                                                      <div className="flex items-center gap-3 pt-1">
                                                        <a href={`https://www.google.com/search?q=${encodeURIComponent(card.name + ' Iceland')}`}
                                                          target="_blank" rel="noopener noreferrer" className="text-teal hover:underline inline-flex items-center gap-1">🔍 Google</a>
                                                        <a href={`https://www.google.com/search?q=${encodeURIComponent(card.name + ' Iceland reddit')}`}
                                                          target="_blank" rel="noopener noreferrer" className="text-terracotta hover:underline inline-flex items-center gap-1">💬 Reddit</a>
                                                      </div>
                                                      <div className="pt-1"><StarRating score={card.redditScore} /></div>
                                                    </div>
                                                    <div className="mt-3 pt-3 border-t border-gray-100 space-y-2">
                                                      <VoteButtons cardId={card.id} currentUser={currentUser} votes={votes} onVote={onVote} />
                                                      <CommentSection cardId={card.id} currentUser={currentUser} comments={cardComments} onAddComment={onAddCardComment} />
                                                    </div>
                                                  </div>
                                                )}
                                              </div>
                                              {idx < dayStops.length - 1 && (() => {
                                                const info = getDriveInfo(dayStops[idx], dayStops[idx + 1]);
                                                return info && info.km > 0 ? (
                                                  <div className="flex items-center justify-center py-0.5">
                                                    <span className="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">🚗 {info.label}</span>
                                                  </div>
                                                ) : null;
                                              })()}
                                            </div>
                                          );
                                        })}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {Object.keys(getDraftsFor(viewingDraftsFor)).length === 0 && (
                      <div className="text-center py-8 text-sm text-gray-400">
                        {viewingDraftsFor === currentUser ? 'Open the My Trip panel to start your first draft!' : 'No drafts yet'}
                      </div>
                    )}
                  </div>
                </div>
              )
            )}
          </div>
        );
      }

      // Itinerary day-by-day view
      const comments = itineraryComments[viewingName] || [];

      return (
        <div className="max-w-4xl mx-auto px-6 py-6">
          {/* Header */}
          <div className="flex items-center gap-4 mb-6">
            <button onClick={() => setViewingName(null)}
              className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 text-sm font-bold">←</button>
            <div className="flex-1">
              <h2 className="font-display text-2xl font-bold text-[#1A1A1A]">{viewingName}'s Itinerary</h2>
              <p className="text-sm text-gray-400">{isOwner ? 'Tap + to add stops, click a stop to see details' : 'Click any stop for details — leave comments below'}</p>
            </div>
            {(() => {
              const totalStopCount = DAYS.filter(d => d.day <= 7).reduce((sum, d) => sum + getStops(d.day).length, 0);
              return totalStopCount > 0 ? (
                <button onClick={() => {
                  if (allExpanded) {
                    setExpandedStops({});
                    setAllExpanded(false);
                  } else {
                    const all = {};
                    DAYS.filter(d => d.day <= 7).forEach(d => getStops(d.day).forEach(id => { all[id] = true; }));
                    setExpandedStops(all);
                    setAllExpanded(true);
                  }
                }}
                  className="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 text-gray-500 hover:bg-teal-50 hover:text-teal hover:border-teal/30 transition-all shrink-0">
                  {allExpanded ? '⊟ Collapse All' : '⊞ Expand All'}
                </button>
              ) : null;
            })()}
          </div>

          {/* Days */}
          {DAYS.filter(d => d.day <= 7).map(dayData => {
            const stops = getStops(dayData.day);
            const summary = getDaySummary(dayData.day);
            const region = stops.length > 0 ? getRegionForStops(stops) : null;
            return (
              <div key={dayData.day} className="mb-6">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <span className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white"
                      style={{ background: DAY_COLORS[(dayData.day - 1) % DAY_COLORS.length] }}>
                      {dayData.day}
                    </span>
                    <div>
                      <span className="font-display font-bold text-sm">{dayData.date} — {dayData.title}</span>
                      {region && <span className="text-[11px] text-gray-400 ml-2">📍 {region}</span>}
                    </div>
                  </div>
                  {stops.length > 0 && (
                    <div className="text-[11px] text-gray-400 flex gap-3">
                      <span>{summary.count} stop{summary.count !== 1 ? 's' : ''}</span>
                      {summary.driveMin > 0 && <span>🚗 {summary.driveMin >= 60 ? `${Math.floor(summary.driveMin/60)}h ${summary.driveMin%60}m` : `${summary.driveMin} min`}</span>}
                      {summary.cost > 0 && <span>${Math.round(summary.cost)}/person</span>}
                    </div>
                  )}
                </div>

                {stops.length === 0 ? (
                  <div className="border border-dashed border-gray-200 rounded-lg p-4 text-center text-sm text-gray-400">
                    {isOwner ? (
                      <button onClick={() => { setPickerDay(dayData.day); setPickerSearch(''); }}
                        className="text-teal hover:underline font-medium">+ Add your first stop</button>
                    ) : 'No stops planned'}
                  </div>
                ) : (
                  <div className="space-y-0">
                    {stops.map((cardId, idx) => {
                      const card = findCard(cardId);
                      if (!card) return null;
                      const img = (IMAGE_URLS[card.id] || [])[0];
                      const isExpanded = expandedStops[cardId];
                      return (
                        <div key={cardId}>
                          <div className={`itinerary-stop bg-white rounded-lg border p-3 ${isExpanded ? 'border-teal/30 shadow-sm' : 'border-gray-100'}`}>
                            <div className="flex items-center gap-3 cursor-pointer"
                              onClick={() => setExpandedStops(prev => ({ ...prev, [cardId]: !prev[cardId] }))}>
                              {img && <img src={img.url} alt={img.alt || card.name} className="w-12 h-12 rounded-lg object-cover shrink-0" loading="lazy" />}
                              <span className="text-lg shrink-0">{getCategoryIcon(card.category)}</span>
                              <div className="flex-1 min-w-0">
                                <div className="font-semibold text-sm text-[#1A1A1A] hover:text-teal transition-colors">{card.name}</div>
                                <div className="text-[11px] text-gray-400">{card.timeNeeded} · {card.costDisplay}</div>
                              </div>
                              <span className={`text-gray-400 text-xs transition-transform shrink-0 mr-1 ${isExpanded ? 'rotate-90' : ''}`}>▶</span>
                              {isOwner && (
                                <div className="flex gap-1 shrink-0" onClick={e => e.stopPropagation()}>
                                  <button onClick={() => moveStop(dayData.day, idx, -1)} disabled={idx === 0}
                                    className="w-7 h-7 rounded bg-gray-100 hover:bg-teal-50 text-sm disabled:opacity-30">▲</button>
                                  <button onClick={() => moveStop(dayData.day, idx, 1)} disabled={idx === stops.length - 1}
                                    className="w-7 h-7 rounded bg-gray-100 hover:bg-teal-50 text-sm disabled:opacity-30">▼</button>
                                  <button onClick={() => removeStop(dayData.day, idx)}
                                    className="w-7 h-7 rounded bg-red-50 hover:bg-red-100 text-red-500 text-sm">✕</button>
                                </div>
                              )}
                            </div>
                            {/* Expanded card details */}
                            {isExpanded && (
                              <div className="mt-3 pt-3 border-t border-gray-100" style={{ animation: 'fadeInUp 0.2s ease-out' }}>
                                {/* Image carousel */}
                                <ImageCarousel images={card.images} cardId={card.id} />
                                {/* Description */}
                                <p className="text-sm text-gray-600 leading-relaxed mt-3">{card.description}</p>
                                {/* Details */}
                                <div className="mt-3 space-y-1 text-xs text-gray-500">
                                  <div className="flex items-center gap-2">
                                    <span className={`font-medium px-2 py-0.5 rounded-full ${getCostTierStyle(card.costTier).bg}`}>
                                      {getCostTierLabel(card.costTier)} {card.costDisplay}
                                    </span>
                                    <span className={`px-2 py-0.5 rounded-full ${getTierBadge(card.tier).cls}`}>{getTierBadge(card.tier).label}</span>
                                  </div>
                                  <div className="flex flex-wrap gap-x-4 gap-y-1">
                                    <span>⏱ {card.timeNeeded}</span>
                                    {card.parkingCost && <span>🅿️ {card.parkingCost}</span>}
                                    {card.driveFromPrevious && <span>📍 {card.driveFromPrevious}</span>}
                                    {(() => { const hd = getHomeBaseDriveInfo(card.id, homeBase); return hd && hd.km > 1 ? (
                                      <span className="text-gray-300">🏠 {hd.label} from {homeBase || 'Reykjavik'}</span>
                                    ) : null; })()}
                                  </div>
                                  {card.bookAheadLabel && <div>📅 {card.bookAheadLabel}</div>}
                                  {card.bookingUrl && (
                                    <div><a href={card.bookingUrl} target="_blank" rel="noopener noreferrer" className="text-teal hover:underline">🔗 Book at {card.bookingSiteName || card.bookingUrl}</a></div>
                                  )}
                                  <div className="flex items-center gap-3 pt-1">
                                    <a href={`https://www.google.com/search?q=${encodeURIComponent(card.name + ' Iceland')}`}
                                      target="_blank" rel="noopener noreferrer" className="text-teal hover:underline inline-flex items-center gap-1">🔍 Google</a>
                                    <a href={`https://www.google.com/search?q=${encodeURIComponent(card.name + ' Iceland reddit')}`}
                                      target="_blank" rel="noopener noreferrer" className="text-terracotta hover:underline inline-flex items-center gap-1">💬 Reddit</a>
                                  </div>
                                  <div className="pt-1"><StarRating score={card.redditScore} /></div>
                                </div>
                                {/* Votes + Comments */}
                                <div className="mt-3 pt-3 border-t border-gray-100 space-y-2">
                                  <VoteButtons cardId={card.id} currentUser={currentUser} votes={votes} onVote={onVote} />
                                  <CommentSection cardId={card.id} currentUser={currentUser} comments={cardComments} onAddComment={onAddCardComment} />
                                </div>
                              </div>
                            )}
                          </div>
                          {idx < stops.length - 1 && (() => {
                            const info = getDriveInfo(stops[idx], stops[idx + 1]);
                            return info && info.km > 0 ? (
                              <div className="flex items-center justify-center py-1">
                                <span className="text-[11px] text-gray-400 bg-gray-50 px-3 py-0.5 rounded-full border border-gray-100">
                                  🚗 {info.label}
                                </span>
                              </div>
                            ) : null;
                          })()}
                        </div>
                      );
                    })}
                    {isOwner && (
                      <button onClick={() => { setPickerDay(dayData.day); setPickerSearch(''); }}
                        className="w-full mt-2 py-2 rounded-lg border border-dashed border-teal/30 text-teal text-sm font-medium hover:bg-teal-50/50 transition-all">
                        + Add stop
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {/* Comments section */}
          <div className="mt-8 bg-white rounded-xl border border-gray-100 p-6">
            <h3 className="font-display text-lg font-bold mb-3">
              {isOwner ? 'Comments from family' : `Suggestions for ${viewingName}`}
            </h3>
            {comments.length === 0 ? (
              <p className="text-sm text-gray-400 mb-4">{isOwner ? 'No comments yet' : 'Be the first to leave a suggestion!'}</p>
            ) : (
              <div className="space-y-3 mb-4">
                {comments.map((c, i) => (
                  <div key={i} className="flex gap-3">
                    <span className="w-7 h-7 rounded-full bg-teal text-white flex items-center justify-center text-xs font-bold shrink-0">{c.author[0]}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm">
                        <span className="font-semibold text-[#1A1A1A]">{c.author}</span>
                        <span className="text-gray-400 text-xs ml-2">{formatRelativeTime(c.timestamp)}</span>
                      </div>
                      <p className="text-sm text-gray-600 mt-0.5">{c.text}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {!isOwner && (
              <div className="flex gap-2">
                <input value={commentText} onChange={e => setCommentText(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && submitComment()}
                  placeholder={`Suggestion for ${viewingName}...`}
                  className="flex-1 px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-teal" />
                <button onClick={submitComment} disabled={!commentText.trim()}
                  className="px-4 py-2 rounded-lg bg-teal text-white text-sm font-medium disabled:opacity-40 hover:bg-teal-600 transition-all">
                  Send
                </button>
              </div>
            )}
          </div>

          {/* Card picker modal */}
          <AnimatedModal open={pickerDay !== null} onClose={() => setPickerDay(null)} zIndex={10000}>
            {pickerDay !== null && (
              <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 max-h-[80vh] flex flex-col">
                <div className="p-4 border-b border-gray-100">
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="font-display font-bold text-lg">Add to Day {pickerDay}</h3>
                    <button onClick={() => setPickerDay(null)}
                      className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg">✕</button>
                  </div>
                  <input value={pickerSearch} onChange={e => setPickerSearch(e.target.value)}
                    placeholder="Search attractions..."
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-teal" autoFocus />
                </div>
                <div className="overflow-y-auto p-4 space-y-1.5">
                  {allCards
                    .filter(c => {
                      if (pickerSearch) return c.name.toLowerCase().includes(pickerSearch.toLowerCase());
                      return c.day === pickerDay || !c.day;
                    })
                    .map(card => {
                      const alreadyAdded = getStops(pickerDay).includes(card.id);
                      return (
                        <button key={card.id}
                          onClick={() => { if (!alreadyAdded) addStop(pickerDay, card.id); }}
                          disabled={alreadyAdded}
                          className={`w-full flex items-center gap-3 p-3 rounded-lg text-left transition-all ${
                            alreadyAdded ? 'bg-teal-50 opacity-60' : 'hover:bg-gray-50 border border-gray-100'
                          }`}>
                          <span className="text-lg">{getCategoryIcon(card.category)}</span>
                          <div className="flex-1 min-w-0">
                            <div className="font-semibold text-sm">{card.name}</div>
                            <div className="text-[11px] text-gray-400">Day {card.day || '?'} · {card.costDisplay} · {card.timeNeeded}</div>
                          </div>
                          {alreadyAdded ? (
                            <span className="text-teal text-sm">✓</span>
                          ) : (
                            <span className="text-teal text-lg font-bold">+</span>
                          )}
                        </button>
                      );
                    })}
                </div>
              </div>
            )}
          </AnimatedModal>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // ITINERARY SIDE PANEL
    // ═══════════════════════════════════════════

    function ItinerarySidePanel({ open, onClose, currentUser, votes, comments, allCards, onVote, onAddComment,
        tripDrafts, activeDraftId, onSetDraftDay, onUpdateDraftDayCount, onCreateDraft, onSetActiveDraft, onRenameDraft, homeBase }) {
      const [collapsedDays, setCollapsedDays] = useState({});
      const [pickerDay, setPickerDay] = useState(null);
      const [pickerSearch, setPickerSearch] = useState('');
      const [pickerFilters, setPickerFilters] = useState({ category: 'all', cost: 'all', booking: 'all', rating: 'all' });
      const [expandedCard, setExpandedCard] = useState(null);
      const [editingTitle, setEditingTitle] = useState(false);
      const [dragState, setDragState] = useState({ fromDay: null, fromIdx: null, overDay: null, overIdx: null, position: 'before' });
      const dragRef = useRef({ active: false, ghostEl: null, startY: 0, scrollInterval: null, didDrag: false });

      const userTripDrafts = tripDrafts[currentUser] || {};
      const activeDraft = activeDraftId && userTripDrafts[activeDraftId] ? userTripDrafts[activeDraftId] : {};
      const userDays = activeDraft.days || {};
      const panelDayCount = activeDraft.dayCount || 1;
      const draftTitle = activeDraft.title || 'My Trip';

      // Build list of user's drafts for switcher
      const draftList = useMemo(() => {
        return Object.entries(userTripDrafts)
          .filter(([k]) => k !== 'activeDraftId')
          .map(([id, d]) => ({ id, title: d.title || 'Untitled', updatedAt: d.updatedAt }));
      }, [userTripDrafts]);
      const getStops = (dayNum) => (userDays[dayNum] && userDays[dayNum].stops) || [];

      const findCard = (id) => allCards.find(c => c.id === id) || CARDS.find(c => c.id === id);

      // Liked but unplanned cards
      const likedUnplanned = useMemo(() => {
        const upvoted = new Set();
        Object.entries(votes).forEach(([key, val]) => {
          if (val === 'up' && key.endsWith('__' + currentUser)) {
            upvoted.add(key.split('__')[0]);
          }
        });
        const planned = new Set();
        Object.values(userDays).forEach(d => {
          ((d && d.stops) || []).forEach(id => planned.add(id));
        });
        return [...upvoted].filter(id => !planned.has(id)).map(id => findCard(id)).filter(Boolean);
      }, [votes, userDays, currentUser, allCards]);

      // Ensure panelDayCount covers any existing Firebase days
      useEffect(() => {
        const maxDay = Math.max(0, ...Object.keys(userDays).map(Number).filter(n => !isNaN(n)));
        if (maxDay > panelDayCount) onUpdateDraftDayCount(maxDay);
      }, [userDays]);

      const moveStop = (dayNum, idx, direction) => {
        const stops = [...getStops(dayNum)];
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= stops.length) return;
        [stops[idx], stops[newIdx]] = [stops[newIdx], stops[idx]];
        onSetDraftDay(activeDraftId, dayNum, stops);
      };

      const removeStop = (dayNum, idx) => {
        const stops = [...getStops(dayNum)];
        stops.splice(idx, 1);
        onSetDraftDay(activeDraftId, dayNum, stops);
      };

      const addStop = (dayNum, cardId) => {
        const stops = [...getStops(dayNum)];
        if (!stops.includes(cardId)) {
          stops.push(cardId);
          onSetDraftDay(activeDraftId, dayNum, stops);
        }
      };

      // Mouse-based drag system — dragged card follows cursor, siblings displaced via translateY transforms
      const handlePointerDown = (dayNum, idx, e) => {
        if (e.button !== 0) return;
        if (e.target.closest('button')) return;
        e.preventDefault();
        const el = e.currentTarget;
        if (!el) return;
        const startX = e.clientX, startY = e.clientY;
        const rect = el.getBoundingClientRect();
        const panelEl = el.closest('.overflow-y-auto');
        let started = false;
        const clickTarget = e.target;

        const startDrag = () => {
          started = true;
          // Snapshot all stop row positions + element refs for stable hit-testing and imperative transforms
          const rows = document.querySelectorAll('[data-stop-row]');
          const rowSnaps = [];
          rows.forEach(row => {
            const r = row.getBoundingClientRect();
            const snap = { day: parseInt(row.dataset.stopDay), idx: parseInt(row.dataset.stopIdx), top: r.top, bottom: r.bottom, height: r.height, el: row, isSelf: row === el };
            rowSnaps.push(snap);
            if (!snap.isSelf) {
              row.style.transition = 'transform 200ms ease';
              row.style.willChange = 'transform';
            }
          });
          const empties = document.querySelectorAll('[data-empty-day]');
          const emptySnaps = [];
          empties.forEach(zone => {
            const r = zone.getBoundingClientRect();
            emptySnaps.push({ day: parseInt(zone.dataset.emptyDay), top: r.top, bottom: r.bottom });
          });
          const scrollY0 = panelEl ? panelEl.scrollTop : 0;
          const dragHeight = rect.height;
          const gap = 6; // space-y-1.5 = 0.375rem = 6px

          // Create teal insertion indicator (positioned imperatively, no layout impact)
          const indicator = document.createElement('div');
          indicator.style.cssText = 'position:absolute;left:8px;right:8px;height:2px;background:#14b8a6;border-radius:9999px;pointer-events:none;opacity:0;transition:top 150ms ease,opacity 150ms ease;z-index:50;';
          if (panelEl) { panelEl.style.position = 'relative'; panelEl.appendChild(indicator); }

          dragRef.current = {
            active: true, startY: rect.top, offsetY: startY - rect.top, el,
            scrollInterval: null, didDrag: true,
            rowSnaps, emptySnaps, scrollY0, dragHeight, gap, indicator,
            overDay: dayNum, overIdx: idx, position: 'before',
            fromDay: dayNum, fromIdx: idx
          };
          el.style.position = 'relative';
          el.style.zIndex = '100';
          el.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
          el.style.background = '#e5e7eb';
          el.style.borderColor = '#d1d5db';
          el.style.transition = 'box-shadow 200ms ease';
          // Minimal React state — just marks which card is the drag source for isDragging CSS
          setDragState({ fromDay: dayNum, fromIdx: idx, overDay: dayNum, overIdx: idx, position: 'before' });
        };

        // Apply translateY displacement to all sibling cards (dnd-kit style)
        const applyDisplacement = () => {
          const dr = dragRef.current;
          const { rowSnaps, fromDay, fromIdx, overDay, overIdx, position, dragHeight, gap } = dr;
          const insertIdx = position === 'after' ? overIdx + 1 : overIdx;

          for (const snap of rowSnaps) {
            if (snap.isSelf) continue;
            let dy = 0;

            if (snap.day === fromDay && snap.day === overDay) {
              // Same day: items between source and insertion shift to fill/make space
              if (fromIdx < insertIdx) {
                // Dragging down — items in (fromIdx, insertIdx) shift up
                if (snap.idx > fromIdx && snap.idx < insertIdx) dy = -(dragHeight + gap);
              } else if (fromIdx > insertIdx) {
                // Dragging up — items in [insertIdx, fromIdx) shift down
                if (snap.idx >= insertIdx && snap.idx < fromIdx) dy = dragHeight + gap;
              }
            } else if (snap.day === fromDay && snap.day !== overDay) {
              // Source day (cross-day): items after source shift up to close gap
              if (snap.idx > fromIdx) dy = -(dragHeight + gap);
            } else if (snap.day === overDay && snap.day !== fromDay) {
              // Target day (cross-day): items at/after insertion shift down to open gap
              if (snap.idx >= insertIdx) dy = dragHeight + gap;
            }

            snap.el.style.transform = dy !== 0 ? `translateY(${dy}px)` : '';
          }

          // Position the teal indicator line
          if (dr.indicator && panelEl) {
            const scrollDelta = panelEl.scrollTop - dr.scrollY0;
            // Find the snap at the insertion boundary
            let lineY = null;
            if (fromDay === overDay) {
              // Same-day: find the gap where the card will land
              const targetSnap = rowSnaps.find(s => s.day === overDay && s.idx === overIdx && !s.isSelf);
              if (targetSnap) {
                lineY = position === 'before' ? targetSnap.top - scrollDelta - gap / 2 : targetSnap.bottom - scrollDelta + gap / 2;
              }
            } else {
              const targetSnap = rowSnaps.find(s => s.day === overDay && s.idx === overIdx);
              if (targetSnap) {
                lineY = position === 'before' ? targetSnap.top - scrollDelta - gap / 2 : targetSnap.bottom - scrollDelta + gap / 2;
              }
            }
            if (lineY !== null) {
              const panelRect = panelEl.getBoundingClientRect();
              dr.indicator.style.top = (lineY - panelRect.top + panelEl.scrollTop) + 'px';
              dr.indicator.style.opacity = '1';
            } else {
              dr.indicator.style.opacity = '0';
            }
          }
        };

        const onMove = (me) => {
          if (!started) {
            const dist = Math.abs(me.clientY - startY) + Math.abs(me.clientX - startX);
            if (dist < 5) return;
            startDrag();
          }
          if (!dragRef.current.active) return;
          const dy = me.clientY - dragRef.current.offsetY - dragRef.current.startY;
          el.style.transform = `translateY(${dy}px)`;

          // Auto-scroll
          if (panelEl) {
            const panelRect = panelEl.getBoundingClientRect();
            const edgeZone = 40;
            if (dragRef.current.scrollInterval) { clearInterval(dragRef.current.scrollInterval); dragRef.current.scrollInterval = null; }
            if (me.clientY < panelRect.top + edgeZone) {
              dragRef.current.scrollInterval = setInterval(() => panelEl.scrollTop -= 8, 16);
            } else if (me.clientY > panelRect.bottom - edgeZone) {
              dragRef.current.scrollInterval = setInterval(() => panelEl.scrollTop += 8, 16);
            }
          }

          // Hit-test using snapshotted positions (stable — prevents stutter feedback loop)
          const scrollDelta = panelEl ? (panelEl.scrollTop - dragRef.current.scrollY0) : 0;
          let found = false;
          for (const snap of dragRef.current.rowSnaps) {
            if (snap.isSelf) continue;
            const adjTop = snap.top - scrollDelta;
            const adjBottom = snap.bottom - scrollDelta;
            if (me.clientY >= adjTop && me.clientY <= adjBottom) {
              const pos = me.clientY < adjTop + (adjBottom - adjTop) / 2 ? 'before' : 'after';
              if (dragRef.current.overDay !== snap.day || dragRef.current.overIdx !== snap.idx || dragRef.current.position !== pos) {
                dragRef.current.overDay = snap.day;
                dragRef.current.overIdx = snap.idx;
                dragRef.current.position = pos;
                applyDisplacement();
              }
              found = true;
              break;
            }
          }
          if (!found) {
            for (const snap of dragRef.current.emptySnaps) {
              const adjTop = snap.top - scrollDelta;
              const adjBottom = snap.bottom - scrollDelta;
              if (me.clientY >= adjTop && me.clientY <= adjBottom) {
                if (dragRef.current.overDay !== snap.day || dragRef.current.overIdx !== 0 || dragRef.current.position !== 'before') {
                  dragRef.current.overDay = snap.day;
                  dragRef.current.overIdx = 0;
                  dragRef.current.position = 'before';
                  applyDisplacement();
                }
                break;
              }
            }
          }
        };

        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!started) {
            // Was just a click — simulate it since we preventDefault'd mousedown
            const clickable = clickTarget.closest('[data-click-expand]');
            if (clickable) clickable.click();
            return;
          }
          if (dragRef.current.scrollInterval) clearInterval(dragRef.current.scrollInterval);

          // Clear all sibling transforms and will-change
          for (const snap of dragRef.current.rowSnaps) {
            if (!snap.isSelf) {
              snap.el.style.transform = '';
              snap.el.style.transition = '';
              snap.el.style.willChange = '';
            }
          }
          // Remove indicator
          if (dragRef.current.indicator && dragRef.current.indicator.parentNode) {
            dragRef.current.indicator.parentNode.removeChild(dragRef.current.indicator);
          }

          el.style.position = '';
          el.style.zIndex = '';
          el.style.boxShadow = '';
          el.style.background = '';
          el.style.borderColor = '';
          el.style.transform = '';
          el.style.transition = '';

          // Read final position from ref (not React state) and commit the reorder
          const { fromDay, fromIdx, overDay, overIdx, position } = dragRef.current;
          dragRef.current.active = false;

          if (fromDay !== null && overDay !== null && !(fromDay === overDay && fromIdx === overIdx)) {
            const dropIdx = position === 'after' ? overIdx + 1 : overIdx;
            if (fromDay === overDay) {
              const stops = [...getStops(fromDay)];
              const [moved] = stops.splice(fromIdx, 1);
              const insertAt = dropIdx > fromIdx ? dropIdx - 1 : dropIdx;
              stops.splice(insertAt, 0, moved);
              onSetDraftDay(activeDraftId, overDay, stops);
            } else {
              const fromStops = [...getStops(fromDay)];
              const toStops = [...getStops(overDay)];
              const [moved] = fromStops.splice(fromIdx, 1);
              if (!toStops.includes(moved)) {
                toStops.splice(dropIdx, 0, moved);
                onSetDraftDay(activeDraftId, fromDay, fromStops);
                onSetDraftDay(activeDraftId, overDay, toStops);
              }
            }
          }
          setDragState({ fromDay: null, fromIdx: null, overDay: null, overIdx: null, position: 'before' });
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      };

      const getDaySummary = (dayNum) => {
        const stops = getStops(dayNum);
        if (stops.length === 0) return { count: 0, driveMin: 0, cost: 0 };
        let totalDrive = 0, totalCost = 0;
        stops.forEach((id, i) => {
          const card = findCard(id);
          if (card) totalCost += card.costPerPerson || 0;
          if (i > 0) {
            const info = getDriveInfo(stops[i-1], id);
            if (info) totalDrive += info.minutes;
          }
        });
        return { count: stops.length, driveMin: totalDrive, cost: totalCost };
      };

      const deleteDay = (dayNum) => {
        if (getStops(dayNum).length > 0) return;
        if (dayNum !== panelDayCount) return;
        if (activeDraftId && userDays[dayNum]) {
          window.db.ref(`trip-drafts/${currentUser}/${activeDraftId}/days/${dayNum}`).remove();
          window.db.ref(`trip-drafts/${currentUser}/${activeDraftId}/updatedAt`).set(new Date().toISOString());
        }
        onUpdateDraftDayCount(Math.max(1, panelDayCount - 1));
      };

      const totalStops = useMemo(() => {
        let count = 0;
        for (let d = 1; d <= panelDayCount; d++) count += getStops(d).length;
        return count;
      }, [userDays, panelDayCount]);

      // Lock body scroll on mobile when open
      useEffect(() => {
        if (open && window.innerWidth <= 768) {
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = ''; };
        }
      }, [open]);

      const panel = (
        <div>
          {/* Backdrop (mobile) */}
          {open && (
            <div className="side-panel-backdrop fixed inset-0 bg-black/30 md:bg-black/20 z-[1002]"
              onClick={onClose} />
          )}

          {/* Panel */}
          <div className={`side-panel fixed top-0 right-0 bottom-0 z-[1003] bg-white shadow-2xl flex flex-col`}
            style={{ width: 380, transform: open ? 'translateX(0)' : 'translateX(100%)' }}>

            {/* Header */}
            <div className="px-4 py-3 border-b border-gray-100 shrink-0">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-lg">📋</span>
                  {editingTitle ? (
                    <input defaultValue={draftTitle} autoFocus
                      onBlur={e => { onRenameDraft(activeDraftId, e.target.value.trim() || draftTitle); setEditingTitle(false); }}
                      onKeyDown={e => { if (e.key === 'Enter') { onRenameDraft(activeDraftId, e.target.value.trim() || draftTitle); setEditingTitle(false); } }}
                      className="font-display text-lg font-bold text-[#1A1A1A] border-b-2 border-teal outline-none bg-transparent w-32" />
                  ) : (
                    <h2 className="font-display text-lg font-bold text-[#1A1A1A] cursor-pointer hover:text-teal transition-colors"
                      onClick={() => setEditingTitle(true)} title="Click to rename">
                      {draftTitle}
                    </h2>
                  )}
                  {totalStops > 0 && (
                    <span className="text-[11px] font-semibold text-teal bg-teal-50 px-2 py-0.5 rounded-full">
                      {totalStops} stop{totalStops !== 1 ? 's' : ''}
                    </span>
                  )}
                </div>
                <button onClick={onClose}
                  className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-sm font-bold">
                  ✕
                </button>
              </div>
              {/* Draft switcher */}
              {draftList.length > 1 && (
                <div className="flex items-center gap-1.5 mt-2 flex-wrap">
                  {draftList.map(d => (
                    <button key={d.id} onClick={() => onSetActiveDraft(d.id)}
                      className={`px-2 py-0.5 rounded-full text-[11px] font-medium transition-all ${
                        d.id === activeDraftId ? 'bg-teal text-white' : 'bg-gray-100 text-gray-500 hover:bg-teal-50 hover:text-teal'
                      }`}>
                      {d.title}
                    </button>
                  ))}
                  {draftList.length < 5 && (
                    <button onClick={() => onCreateDraft()}
                      className="px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-gray-400 hover:bg-teal-50 hover:text-teal transition-all">
                      + New
                    </button>
                  )}
                </div>
              )}
            </div>

            {/* Scrollable content */}
            <div className="flex-1 overflow-y-auto px-4 py-3 space-y-4">

              {/* Liked but unplanned — grouped by region */}
              {likedUnplanned.length > 0 && (() => {
                const grouped = {};
                likedUnplanned.forEach(card => {
                  const region = getRegionForCard(card.id);
                  if (!grouped[region]) grouped[region] = [];
                  grouped[region].push(card);
                });
                // Sort regions to match the trip route order
                const regionOrder = REGION_CENTROIDS.map(r => r.name);
                const sortedRegions = Object.keys(grouped).sort((a, b) => {
                  const ai = regionOrder.indexOf(a), bi = regionOrder.indexOf(b);
                  return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
                });
                return (
                  <div>
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Liked — not yet planned</span>
                      <span className="text-[10px] text-gray-400">({likedUnplanned.length})</span>
                    </div>
                    <div className="space-y-3">
                      {sortedRegions.map(region => (
                        <div key={region}>
                          <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1 flex items-center gap-1">
                            <span>📍</span> {region}
                          </div>
                          <div className="space-y-1">
                            {grouped[region].map(card => {
                              const img = (IMAGE_URLS[card.id] || [])[0];
                              return (
                                <div key={card.id} className="panel-stop flex items-center gap-2 p-2 rounded-lg border border-gray-100">
                                  <div className="flex items-center gap-2 flex-1 min-w-0 cursor-pointer" onClick={() => setExpandedCard(card)}>
                                    {img && <img src={img.url} alt={card.name} className="w-8 h-8 rounded object-cover shrink-0" loading="lazy" />}
                                    <span className="text-sm shrink-0">{getCategoryIcon(card.category)}</span>
                                    <div className="flex-1 min-w-0">
                                      <div className="font-medium text-xs text-[#1A1A1A] truncate hover:text-teal transition-colors">{card.name}</div>
                                    </div>
                                  </div>
                                  {panelDayCount <= 1 ? (
                                    <button onClick={() => addStop(1, card.id)}
                                      className="text-teal text-xs font-bold px-2 py-1 rounded hover:bg-teal-50 shrink-0">
                                      + Day 1
                                    </button>
                                  ) : (
                                    <select onChange={(e) => { if (e.target.value) { addStop(parseInt(e.target.value), card.id); e.target.value = ''; } }}
                                      defaultValue="" className="text-xs text-teal font-medium bg-transparent border border-teal/30 rounded px-1.5 py-1 cursor-pointer shrink-0">
                                      <option value="" disabled>+ Day...</option>
                                      {Array.from({ length: panelDayCount }, (_, i) => i + 1).map(d => (
                                        <option key={d} value={d}>Day {d}</option>
                                      ))}
                                    </select>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* Days */}
              {Array.from({ length: panelDayCount }, (_, i) => i + 1).map(dayNum => {
                const stops = getStops(dayNum);
                const summary = getDaySummary(dayNum);
                const collapsed = collapsedDays[dayNum];
                return (
                  <div key={dayNum} className="border border-gray-100 rounded-xl overflow-hidden">
                    {/* Day header */}
                    <button onClick={() => setCollapsedDays(prev => ({ ...prev, [dayNum]: !prev[dayNum] }))}
                      className="w-full flex items-center gap-2 px-3 py-2.5 bg-gray-50 hover:bg-gray-100 transition-colors text-left">
                      <span className="w-6 h-6 rounded-full bg-teal text-white flex items-center justify-center text-[11px] font-bold shrink-0">
                        {dayNum}
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-1.5">
                            <span className="font-display font-bold text-sm">Day {dayNum}</span>
                            {DAYS[dayNum - 1] && <span className="text-[10px] text-gray-400">· {DAYS[dayNum - 1].date.split(' ').slice(1).join(' ')}</span>}
                          </div>
                          {DAYS[dayNum - 1] ? (
                            <span className="font-bold text-sm text-[#1A1A1A]">📍 {DAYS[dayNum - 1].region}</span>
                          ) : (
                            stops.length > 0 && (() => { const r = getRegionForStops(stops); return r ? <span className="font-bold text-sm text-[#1A1A1A]">📍 {r}</span> : null; })()
                          )}
                        </div>
                        {stops.length > 0 && (
                          <div className="text-[10px] text-gray-400 flex gap-2 mt-0.5">
                            <span>{summary.count} stop{summary.count !== 1 ? 's' : ''}</span>
                            {summary.driveMin > 0 && <span>🚗 {summary.driveMin >= 60 ? `${Math.floor(summary.driveMin/60)}h${summary.driveMin%60}m` : `${summary.driveMin}m`}</span>}
                            {summary.cost > 0 && <span>${Math.round(summary.cost)}/pp</span>}
                          </div>
                        )}
                      </div>
                      <span className={`text-gray-400 text-xs transition-transform ${collapsed ? '' : 'rotate-90'}`}>▶</span>
                    </button>

                    {/* Day content */}
                    {!collapsed && (
                      <div className="px-2 py-2 space-y-1.5">
                        {stops.length === 0 ? (
                          <div className={`text-center py-4 rounded-lg transition-all`}
                            data-empty-day={dayNum}>
                            <p className="text-xs text-gray-400 mb-2">No stops yet</p>
                            <button onClick={() => { setPickerDay(dayNum); setPickerSearch(''); }}
                              className="text-teal text-xs font-medium hover:underline">+ Add your first stop</button>
                          </div>
                        ) : (
                          <>
                            {stops.map((cardId, idx) => {
                              const card = findCard(cardId);
                              if (!card) return null;
                              const img = (IMAGE_URLS[card.id] || [])[0];
                              const isDragging = dragState.fromDay === dayNum && dragState.fromIdx === idx;
                              return (
                                <div key={cardId}>
                                  <div className={`panel-stop flex items-center gap-2 p-2 rounded-xl border cursor-grab active:cursor-grabbing select-none ${
                                    isDragging ? 'bg-gray-200 border-gray-300' : 'bg-white border-gray-100'}`}
                                    data-stop-row data-stop-day={dayNum} data-stop-idx={idx}
                                    onMouseDown={(e) => handlePointerDown(dayNum, idx, e)}>
                                    <span className="text-gray-300 text-xs shrink-0">⠿</span>
                                    <div className="flex items-center gap-2 flex-1 min-w-0 cursor-pointer" data-click-expand onClick={() => { if (dragRef.current.didDrag) { dragRef.current.didDrag = false; return; } setExpandedCard(card); }}>
                                      {img && <img src={img.url} alt={card.name} className="w-10 h-10 rounded-lg object-cover shrink-0 pointer-events-none" loading="lazy" />}
                                      <span className="text-sm shrink-0">{getCategoryIcon(card.category)}</span>
                                      <div className="flex-1 min-w-0">
                                        <div className="font-semibold text-xs text-[#1A1A1A] truncate hover:text-teal transition-colors">{card.name}</div>
                                        <div className="text-[10px] text-gray-400">{card.timeNeeded} · {card.costDisplay}</div>
                                      </div>
                                    </div>
                                    <div className="flex gap-0.5 shrink-0">
                                      <button onClick={() => moveStop(dayNum, idx, -1)} disabled={idx === 0}
                                        className="w-6 h-6 rounded bg-gray-100 hover:bg-teal-50 text-[11px] disabled:opacity-30 hidden sm:flex items-center justify-center">▲</button>
                                      <button onClick={() => moveStop(dayNum, idx, 1)} disabled={idx === stops.length - 1}
                                        className="w-6 h-6 rounded bg-gray-100 hover:bg-teal-50 text-[11px] disabled:opacity-30 hidden sm:flex items-center justify-center">▼</button>
                                      <button onClick={() => removeStop(dayNum, idx)}
                                        className="w-6 h-6 rounded bg-red-50 hover:bg-red-100 text-red-500 text-[11px]">✕</button>
                                    </div>
                                  </div>
                                  {idx < stops.length - 1 && (() => {
                                    const info = getDriveInfo(stops[idx], stops[idx + 1]);
                                    return info && info.km > 0 ? (
                                      <div className="flex items-center justify-center py-0.5">
                                        <span className="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">
                                          🚗 {info.label}
                                        </span>
                                      </div>
                                    ) : null;
                                  })()}
                                </div>
                              );
                            })}
                            <button onClick={() => { setPickerDay(dayNum); setPickerSearch(''); }}
                              className="w-full mt-1 py-1.5 rounded-lg border border-dashed border-teal/30 text-teal text-xs font-medium hover:bg-teal-50/50 transition-all">
                              + Add stop
                            </button>
                          </>
                        )}

                        {/* Delete day button — only if empty and last day and more than 1 day */}
                        {stops.length === 0 && dayNum === panelDayCount && panelDayCount > 1 && (
                          <button onClick={() => deleteDay(dayNum)}
                            className="w-full mt-1 py-1.5 text-[11px] text-red-400 hover:text-red-600 transition-colors">
                            Remove Day {dayNum}
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Add Day button */}
              <button onClick={() => onUpdateDraftDayCount(panelDayCount + 1)}
                className="w-full py-2.5 rounded-xl border-2 border-dashed border-gray-200 text-gray-500 text-sm font-medium hover:border-teal hover:text-teal hover:bg-teal-50/30 transition-all">
                + Add Day {panelDayCount + 1}
              </button>
            </div>

            {/* Card picker modal */}
            <AnimatedModal open={pickerDay !== null} onClose={() => { setPickerDay(null); setPickerFilters({ category: 'all', cost: 'all', booking: 'all', rating: 'all' }); }} zIndex={10000}>
            {pickerDay !== null && (() => {
              const pf = pickerFilters;
              const hasPickerFilters = pf.category !== 'all' || pf.cost !== 'all' || pf.booking !== 'all' || pf.rating !== 'all';
              const togglePF = (key, val) => setPickerFilters(prev => ({ ...prev, [key]: prev[key] === val ? 'all' : val }));
              let pickerCards = allCards;
              if (pickerSearch) pickerCards = pickerCards.filter(c => c.name.toLowerCase().includes(pickerSearch.toLowerCase()));
              if (pf.category !== 'all') pickerCards = pickerCards.filter(c => c.category === pf.category);
              if (pf.cost !== 'all') pickerCards = pickerCards.filter(c => c.costTier === pf.cost);
              if (pf.booking !== 'all') {
                if (pf.booking === 'none') pickerCards = pickerCards.filter(c => !c.bookAhead);
                else if (pf.booking === 'soon') pickerCards = pickerCards.filter(c => c.bookAhead && !c.bookAhead.toLowerCase().includes('month'));
                else if (pf.booking === 'months') pickerCards = pickerCards.filter(c => c.bookAhead && c.bookAhead.toLowerCase().includes('month'));
              }
              if (pf.rating !== 'all') {
                const minR = parseInt(pf.rating);
                pickerCards = pickerCards.filter(c => c.redditScore && c.redditScore >= minR);
              }
              return (
                <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 max-h-[80vh] flex flex-col">
                  <div className="p-4 border-b border-gray-100">
                    <div className="flex items-center justify-between mb-3">
                      <h3 className="font-display font-bold text-lg">Add to Day {pickerDay}</h3>
                      <button onClick={() => { setPickerDay(null); setPickerFilters({ category: 'all', cost: 'all', booking: 'all', rating: 'all' }); }}
                        className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg">✕</button>
                    </div>
                    <input value={pickerSearch} onChange={e => setPickerSearch(e.target.value)}
                      placeholder="Search attractions..."
                      className="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-teal mb-3" autoFocus />
                    {/* Filter pills */}
                    <div className="space-y-2">
                      <div>
                        <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Type</div>
                        <div className="flex flex-wrap gap-1.5">
                          {[{id:'sightseeing',icon:'🏔️',label:'Sightseeing'},{id:'activity',icon:'🎯',label:'Activities'},{id:'restaurant',icon:'🍽️',label:'Restaurants'}].map(o => (
                            <button key={o.id} onClick={() => togglePF('category', o.id)}
                              className={`px-2.5 py-1 rounded-full text-[11px] font-medium transition-all ${
                                pf.category === o.id ? 'bg-teal text-white' : 'bg-gray-100 text-gray-500 hover:bg-teal-50 hover:text-teal'
                              }`}>{o.icon} {o.label}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Cost</div>
                        <div className="flex flex-wrap gap-1.5">
                          {[{id:'free',icon:'🟢',label:'Free/Cheap'},{id:'moderate',icon:'🟡',label:'Moderate'},{id:'splurge',icon:'🔴',label:'Splurge'}].map(o => (
                            <button key={o.id} onClick={() => togglePF('cost', o.id)}
                              className={`px-2.5 py-1 rounded-full text-[11px] font-medium transition-all ${
                                pf.cost === o.id ? 'bg-teal text-white' : 'bg-gray-100 text-gray-500 hover:bg-teal-50 hover:text-teal'
                              }`}>{o.icon} {o.label}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Booking</div>
                        <div className="flex flex-wrap gap-1.5">
                          {[{id:'none',icon:'✅',label:'No booking'},{id:'soon',icon:'🔥',label:'Weeks ahead'},{id:'months',icon:'⏰',label:'Months ahead'}].map(o => (
                            <button key={o.id} onClick={() => togglePF('booking', o.id)}
                              className={`px-2.5 py-1 rounded-full text-[11px] font-medium transition-all ${
                                pf.booking === o.id ? 'bg-teal text-white' : 'bg-gray-100 text-gray-500 hover:bg-teal-50 hover:text-teal'
                              }`}>{o.icon} {o.label}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Hype</div>
                        <div className="flex flex-wrap gap-1.5">
                          {[{id:'5',icon:'🤩',label:'5 Stars'},{id:'4',icon:'🔥',label:'4+ Stars'},{id:'3',icon:'👍',label:'3+ Stars'},{id:'2',icon:'👌',label:'2+ Stars'}].map(o => (
                            <button key={o.id} onClick={() => togglePF('rating', o.id)}
                              className={`px-2.5 py-1 rounded-full text-[11px] font-medium transition-all ${
                                pf.rating === o.id ? 'bg-teal text-white' : 'bg-gray-100 text-gray-500 hover:bg-teal-50 hover:text-teal'
                              }`}>{o.icon} {o.label}</button>
                          ))}
                        </div>
                      </div>
                      {hasPickerFilters && (
                        <button onClick={() => setPickerFilters({ category: 'all', cost: 'all', booking: 'all', rating: 'all' })}
                          className="text-[11px] text-terracotta hover:underline">Clear filters</button>
                      )}
                    </div>
                  </div>
                  <div className="overflow-y-auto p-4 space-y-1.5">
                    {pickerCards.length === 0 ? (
                      <div className="text-center py-8 text-sm text-gray-400">No matching attractions</div>
                    ) : pickerCards.map(card => {
                        const alreadyAdded = getStops(pickerDay).includes(card.id);
                        const img = (IMAGE_URLS[card.id] || [])[0];
                        return (
                          <button key={card.id}
                            onClick={() => { if (!alreadyAdded) addStop(pickerDay, card.id); }}
                            disabled={alreadyAdded}
                            className={`w-full flex items-center gap-3 p-3 rounded-lg text-left transition-all ${
                              alreadyAdded ? 'bg-teal-50 opacity-60' : 'hover:bg-gray-50 border border-gray-100'
                            }`}>
                            {img && <img src={img.url} alt={card.name} className="w-10 h-10 rounded-lg object-cover shrink-0" loading="lazy" />}
                            <span className="text-lg">{getCategoryIcon(card.category)}</span>
                            <div className="flex-1 min-w-0">
                              <div className="font-semibold text-sm">{card.name}</div>
                              <div className="text-[11px] text-gray-400">{card.costDisplay} · {card.timeNeeded}</div>
                            </div>
                            {alreadyAdded ? (
                              <span className="text-teal text-sm">✓</span>
                            ) : (
                              <span className="text-teal text-lg font-bold">+</span>
                            )}
                          </button>
                        );
                      })}
                  </div>
                </div>
              );
            })()}
            </AnimatedModal>

          </div>
        </div>
      );

      const expandedModal = (
        <AnimatedModal open={!!expandedCard} onClose={() => setExpandedCard(null)} zIndex={10000}
          className={open && window.innerWidth > 768 ? 'pr-[380px]' : ''}>
          {expandedCard && (
            <div className="relative max-w-md w-full mx-4 max-h-[85vh] overflow-y-auto rounded-2xl shadow-2xl">
              <button onClick={() => setExpandedCard(null)}
                className="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-white/90 shadow flex items-center justify-center text-gray-600 hover:bg-white text-lg font-bold">✕</button>
              <CardComponent card={expandedCard} currentUser={currentUser}
                votes={votes} comments={comments} onVote={onVote}
                onAddComment={onAddComment} delay={0} homeBase={homeBase} />
            </div>
          )}
        </AnimatedModal>
      );

      return (
        <>
          {ReactDOM.createPortal(panel, document.body)}
          {expandedModal}
        </>
      );
    }

    // ═══════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [votes, setVotes] = useState({});
      const [comments, setComments] = useState({});
      const [suggestions, setSuggestions] = useState([]);
      const [activeFilter, setActiveFilter] = useState('all');
      const [showSuggestionModal, setShowSuggestionModal] = useState(false);
      const [showTutorial, setShowTutorial] = useState(false);
      const [homeBase, setHomeBase] = useState('Reykjavik');
      const [showHomeBaseModal, setShowHomeBaseModal] = useState(false);
      const [activeDay, setActiveDay] = useState(1);
      const [showFloatingDay, setShowFloatingDay] = useState(false);
      const [advancedFilters, setAdvancedFilters] = useState({ category: 'all', cost: 'all', booking: 'all', rating: 'all' });
      const [stickyHeight, setStickyHeight] = useState(100);
      const [itineraries, setItineraries] = useState({});
      const [itineraryComments, setItineraryComments] = useState({});
      const [viewMode, setViewMode] = useState('list');
      const [sidePanelOpen, setSidePanelOpen] = useState(false);
      const [panelDayCount, setPanelDayCount] = useState(DAYS.length);
      const [tripDrafts, setTripDrafts] = useState({});
      const stickyRef = useRef(null);
      const [authenticated, setAuthenticated] = useState(() => localStorage.getItem('icp_auth') === 'true');
      const [hasUpdate, setHasUpdate] = useState(() => localStorage.getItem('icp_version') !== APP_VERSION);
      const [loading, setLoading] = useState(true);

      // Load personal data from localStorage, shared data from Firebase (real-time)
      useEffect(() => {
        // Personal (per-browser) — stays in localStorage
        const user = localStorage.getItem('icp_currentUser');
        if (user) setCurrentUser(user);

        const db = window.db;
        let loadCount = 0;
        const checkReady = () => { loadCount++; if (loadCount >= 7) setLoading(false); };

        // Votes — real-time listener
        db.ref('votes').on('value', (snap) => {
          setVotes(snap.val() || {});
          checkReady();
        });

        // Comments — real-time listener
        db.ref('comments').on('value', (snap) => {
          setComments(snap.val() || {});
          checkReady();
        });

        // Suggestions — real-time listener
        db.ref('suggestions').on('value', (snap) => {
          setSuggestions(snap.val() || []);
          checkReady();
        });

        // Home base — real-time listener
        db.ref('homeBase').on('value', (snap) => {
          if (snap.val()) setHomeBase(snap.val());
          checkReady();
        });

        // Itineraries — real-time listener
        db.ref('itineraries').on('value', (snap) => {
          setItineraries(snap.val() || {});
          checkReady();
        });

        // Itinerary comments — real-time listener
        db.ref('itinerary-comments').on('value', (snap) => {
          setItineraryComments(snap.val() || {});
          checkReady();
        });

        // Trip drafts — real-time listener
        db.ref('trip-drafts').on('value', (snap) => {
          setTripDrafts(snap.val() || {});
          checkReady();
        });

        // If no user stored, still stop loading
        if (!user) setLoading(false);

        return () => {
          db.ref('votes').off();
          db.ref('comments').off();
          db.ref('suggestions').off();
          db.ref('homeBase').off();
          db.ref('itineraries').off();
          db.ref('itinerary-comments').off();
          db.ref('trip-drafts').off();
        };
      }, []);

      // Track sticky header height
      useEffect(() => {
        if (!stickyRef.current) return;
        const ro = new ResizeObserver(([entry]) => setStickyHeight(Math.ceil(entry.contentRect.height)));
        ro.observe(stickyRef.current);
        return () => ro.disconnect();
      }, [currentUser]);

      // Scroll tracking for day navigator
      useEffect(() => {
        const handleScroll = () => {
          const headerH = stickyRef.current ? stickyRef.current.offsetHeight : 100;
          let current = 1;
          for (const d of DAYS) {
            const el = document.getElementById('day-section-' + d.day);
            if (el && el.getBoundingClientRect().top <= headerH + 20) {
              current = d.day;
            }
          }
          setActiveDay(current);
          // Show floating bar when current day's header is behind the sticky header
          const currentDayEl = document.getElementById('day-section-' + current);
          const dayTop = currentDayEl ? currentDayEl.getBoundingClientRect().top : 999;
          const show = dayTop < headerH - 10;
          setShowFloatingDay(show);
          // Keep stickyHeight in sync for FloatingDayBar positioning
          if (stickyRef.current) setStickyHeight(headerH);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll(); // run once immediately
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const handleSelectUser = (name) => {
        const wasNull = currentUser === null;
        setCurrentUser(name);
        localStorage.setItem('icp_currentUser', name);
        if (wasNull) {
          const seen = localStorage.getItem('icp_tutorialSeen');
          if (!seen) setShowTutorial(true);
        }
      };

      const handleDismissTutorial = () => {
