        setShowTutorial(false);
        localStorage.setItem('icp_tutorialSeen', 'true');
      };

      const handleSetHomeBase = (value) => {
        setShowHomeBaseModal(false);
        window.db.ref('homeBase').set(value);
      };

      const handleVote = (cardId, voter, type) => {
        // Firebase keys can't contain . # $ [ ] so we use _ separator
        const fbKey = `${cardId}__${voter}`;
        if (type === null) {
          window.db.ref(`votes/${fbKey}`).remove();
        } else {
          window.db.ref(`votes/${fbKey}`).set(type);
        }
      };

      const handleAddComment = (cardId, comment, replaceAll) => {
        let updated;
        if (replaceAll) {
          updated = replaceAll;
        } else {
          const existing = comments[cardId] || [];
          updated = [...existing, comment];
        }
        window.db.ref(`comments/${cardId}`).set(updated);
      };

      const handleAddSuggestion = (suggestion) => {
        const updated = [...suggestions, suggestion];
        window.db.ref('suggestions').set(updated);
      };

      const handleDeleteSuggestion = (id) => {
        const updated = suggestions.filter(s => s.id !== id);
        window.db.ref('suggestions').set(updated);
      };

      const handleSetItineraryDay = (ownerName, dayNum, stops) => {
        window.db.ref(`itineraries/${ownerName}/days/${dayNum}/stops`).set(stops);
        window.db.ref(`itineraries/${ownerName}/updatedAt`).set(new Date().toISOString());
      };

      const handleAddItineraryComment = (ownerName, comment) => {
        const existing = itineraryComments[ownerName] || [];
        window.db.ref(`itinerary-comments/${ownerName}`).set([...existing, comment]);
      };

      // ── Trip Drafts helpers ──
      const getActiveDraftId = (userName) => {
        const ud = tripDrafts[userName || currentUser] || {};
        return ud.activeDraftId || null;
      };

      const getActiveDraft = (userName) => {
        const ud = tripDrafts[userName || currentUser] || {};
        const id = ud.activeDraftId;
        return id && ud[id] ? ud[id] : null;
      };

      const getUserDrafts = (userName) => {
        const ud = tripDrafts[userName || currentUser] || {};
        const drafts = {};
        Object.entries(ud).forEach(([k, v]) => {
          if (k !== 'activeDraftId' && typeof v === 'object' && v !== null) drafts[k] = v;
        });
        return drafts;
      };

      const activeDraftDayCount = useMemo(() => {
        const draft = getActiveDraft();
        return draft ? (draft.dayCount || 1) : panelDayCount;
      }, [tripDrafts, currentUser, panelDayCount]);

      // Ensure user has at least one draft
      useEffect(() => {
        if (!currentUser || loading) return;
        const ud = tripDrafts[currentUser] || {};
        const hasDrafts = Object.keys(ud).some(k => k !== 'activeDraftId');
        if (!hasDrafts) {
          const db = window.db;
          const newKey = db.ref('trip-drafts/' + currentUser).push().key;
          const now = new Date().toISOString();
          db.ref('trip-drafts/' + currentUser + '/' + newKey).set({
            title: 'Draft 1', days: {}, dayCount: DAYS.length, createdAt: now, updatedAt: now
          });
          db.ref('trip-drafts/' + currentUser + '/activeDraftId').set(newKey);
        } else if (!ud.activeDraftId) {
          const firstKey = Object.keys(ud).find(k => k !== 'activeDraftId');
          if (firstKey) window.db.ref('trip-drafts/' + currentUser + '/activeDraftId').set(firstKey);
        }
      }, [currentUser, loading, tripDrafts]);

      const handleSetDraftDay = (draftId, dayNum, stops) => {
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/days/${dayNum}/stops`).set(stops);
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/updatedAt`).set(new Date().toISOString());
      };

      const handleUpdateDraftDayCount = (n) => {
        const draftId = getActiveDraftId();
        if (!draftId) return;
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/dayCount`).set(n);
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/updatedAt`).set(new Date().toISOString());
        setPanelDayCount(n);
      };

      const handleCreateDraft = (title) => {
        const drafts = getUserDrafts();
        if (Object.keys(drafts).length >= 5) { alert('Maximum 5 drafts allowed'); return; }
        const db = window.db;
        const newKey = db.ref('trip-drafts/' + currentUser).push().key;
        const now = new Date().toISOString();
        db.ref('trip-drafts/' + currentUser + '/' + newKey).set({
          title: title || ('Draft ' + (Object.keys(drafts).length + 1)),
          days: {}, dayCount: DAYS.length, createdAt: now, updatedAt: now
        });
        db.ref('trip-drafts/' + currentUser + '/activeDraftId').set(newKey);
      };

      const handleDeleteDraft = (draftId) => {
        const drafts = getUserDrafts();
        if (Object.keys(drafts).length <= 1) { alert('Cannot delete your only draft'); return; }
        window.db.ref(`trip-drafts/${currentUser}/${draftId}`).remove();
        if (getActiveDraftId() === draftId) {
          const remaining = Object.keys(drafts).filter(k => k !== draftId);
          window.db.ref('trip-drafts/' + currentUser + '/activeDraftId').set(remaining[0]);
        }
      };

      const handleRenameDraft = (draftId, newTitle) => {
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/title`).set(newTitle);
        window.db.ref(`trip-drafts/${currentUser}/${draftId}/updatedAt`).set(new Date().toISOString());
      };

      const handleSetActiveDraft = (draftId) => {
        window.db.ref('trip-drafts/' + currentUser + '/activeDraftId').set(draftId);
      };

      const handleAddToTrip = (cardId, dayNum) => {
        const draftId = getActiveDraftId();
        if (!draftId) return;
        const draft = getActiveDraft() || {};
        const draftDays = draft.days || {};
        const targetDay = dayNum || (draft.dayCount || 1);
        const existing = (draftDays[targetDay] && draftDays[targetDay].stops) || [];
        if (!existing.includes(cardId)) {
          handleSetDraftDay(draftId, targetDay, [...existing, cardId]);
        }
        setSidePanelOpen(true);
      };

      // Combine pre-loaded cards with suggestions
      const allCards = useMemo(() => {
        return [...CARDS, ...suggestions.map(s => ({ ...s, isUserSubmitted: true }))];
      }, [suggestions]);

      // Filter cards
      const filteredCards = useMemo(() => {
        let cards = allCards;
        if (activeFilter === 'must-decide') cards = cards.filter(c => c.tier === 'must-decide');
        else if (activeFilter === 'restaurants') cards = cards.filter(c => c.category === 'restaurant');
        else if (activeFilter === 'suggestions') cards = cards.filter(c => c.isUserSubmitted);

        // Advanced filters
        if (advancedFilters.category !== 'all') {
          cards = cards.filter(c => c.category === advancedFilters.category);
        }
        if (advancedFilters.cost !== 'all') {
          cards = cards.filter(c => c.costTier === advancedFilters.cost);
        }
        if (advancedFilters.booking !== 'all') {
          if (advancedFilters.booking === 'none') {
            cards = cards.filter(c => !c.bookAhead);
          } else if (advancedFilters.booking === 'soon') {
            cards = cards.filter(c => c.bookAhead && !c.bookAhead.toLowerCase().includes('month'));
          } else if (advancedFilters.booking === 'months') {
            cards = cards.filter(c => c.bookAhead && c.bookAhead.toLowerCase().includes('month'));
          }
        }
        if (advancedFilters.rating !== 'all') {
          const minRating = parseInt(advancedFilters.rating);
          cards = cards.filter(c => c.redditScore && c.redditScore >= minRating);
        }
        return cards;
      }, [allCards, activeFilter, advancedFilters]);

      // Group by day
      const cardsByDay = useMemo(() => {
        const grouped = {};
        filteredCards.forEach(c => {
          const d = c.day || 0;
          if (!grouped[d]) grouped[d] = [];
          grouped[d].push(c);
        });
        return grouped;
      }, [filteredCards]);

      const stats = useMemo(() => ({
        cards: allCards.length,
        votes: Object.keys(votes).length,
      }), [allCards, votes]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="text-4xl mb-4">🇮🇸</div>
              <p className="text-gray-500 font-medium">Loading trip planner...</p>
            </div>
          </div>
        );
      }

      if (!authenticated) {
        return <PasswordGate onSuccess={() => { setAuthenticated(true); localStorage.setItem('icp_auth', 'true'); }} />;
      }

      if (!currentUser) {
        return <UserSelector onSelect={handleSelectUser} />;
      }

      return (
        <div className="min-h-screen pb-24">
          <div ref={stickyRef} className="sticky top-0 z-40 bg-[#FAFAF7]/95 backdrop-blur-md shadow-sm">
            <Header currentUser={currentUser} onSwitchUser={handleSelectUser} stats={stats} onOpenHomeBase={() => setShowHomeBaseModal(true)} />
            <FilterBar activeFilter={activeFilter} onFilterChange={setActiveFilter}
              advancedFilters={advancedFilters} onAdvancedChange={setAdvancedFilters}
              viewMode={viewMode} onViewModeChange={setViewMode} />
          </div>
          {viewMode !== 'map' && activeFilter !== 'itineraries' && <HeroSection cards={CARDS} votes={votes} suggestions={suggestions} />}

          {viewMode === 'list' && activeFilter === 'all' && <DayNavigator activeDay={activeDay} />}
          {viewMode === 'list' && activeFilter === 'all' && (
            <FloatingDayBar dayData={DAYS.find(d => d.day === activeDay)} homeBase={homeBase} stickyTop={stickyHeight} visible={showFloatingDay} />
          )}

          {activeFilter === 'itineraries' ? (
            <ItineraryView currentUser={currentUser} itineraries={itineraries}
              itineraryComments={itineraryComments} onSetDay={handleSetItineraryDay}
              onAddComment={handleAddItineraryComment} allCards={allCards}
              votes={votes} cardComments={comments} onVote={handleVote} onAddCardComment={handleAddComment}
              tripDrafts={tripDrafts} onCreateDraft={handleCreateDraft} onDeleteDraft={handleDeleteDraft}
              onRenameDraft={handleRenameDraft} onSetActiveDraft={handleSetActiveDraft} homeBase={homeBase} />
          ) : activeFilter === 'leaderboard' ? (
            <LeaderboardView allCards={allCards} votes={votes} currentUser={currentUser}
              comments={comments} onVote={handleVote} onAddComment={handleAddComment} />
          ) : viewMode === 'map' ? (
            <MapView filteredCards={filteredCards} currentUser={currentUser}
              votes={votes} comments={comments} onVote={handleVote}
              onAddComment={handleAddComment} onDeleteSuggestion={handleDeleteSuggestion}
              stickyHeight={stickyHeight}
              onAddToTrip={handleAddToTrip} panelDayCount={activeDraftDayCount} homeBase={homeBase} />
          ) : (
            <div className="max-w-7xl mx-auto px-6">
              {DAYS.map(dayData => {
                const dayCards = cardsByDay[dayData.day];
                if (!dayCards || dayCards.length === 0) {
                  if (activeFilter !== 'all') return null;
                  if (dayData.day === 8) {
                    return (
                      <div key={dayData.day}>
                        <DayHeader dayData={dayData} homeBase={homeBase} stickyTop={stickyHeight} />
                        <div className="bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">
                          <span className="text-3xl mb-2 block">✈️</span>
                          <p className="font-medium">Departure day — safe travels!</p>
                          <p className="text-sm mt-1">Add a suggestion if there's something to squeeze in before the flight</p>
                        </div>
                      </div>
                    );
                  }
                  return null;
                }
                return (
                  <div key={dayData.day}>
                    <DayHeader dayData={dayData} homeBase={homeBase} stickyTop={stickyHeight} />
                    <div className="card-grid mb-8">
                      {dayCards.map((card, i) => (
                        <CardComponent key={card.id} card={card} currentUser={currentUser}
                          votes={votes} comments={comments} onVote={handleVote}
                          onAddComment={handleAddComment} delay={i}
                          onDeleteSuggestion={card.isUserSubmitted ? handleDeleteSuggestion : undefined}
                          onAddToTrip={handleAddToTrip} panelDayCount={activeDraftDayCount} homeBase={homeBase} />
                      ))}
                    </div>
                  </div>
                );
              })}
              {/* Flexible day suggestions */}
              {cardsByDay[0] && cardsByDay[0].length > 0 && (
                <div>
                  <div className="mb-6 mt-10">
                    <h2 className="font-display text-2xl font-bold text-[#1A1A1A]">Flexible / Any Day</h2>
                  </div>
                  <div className="card-grid mb-8">
                    {cardsByDay[0].map((card, i) => (
                      <CardComponent key={card.id} card={card} currentUser={currentUser}
                        votes={votes} comments={comments} onVote={handleVote}
                        onAddComment={handleAddComment} delay={i}
                        onDeleteSuggestion={card.isUserSubmitted ? handleDeleteSuggestion : undefined}
                        onAddToTrip={handleAddToTrip} panelDayCount={activeDraftDayCount} homeBase={homeBase} />
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Update notification */}
          {hasUpdate && (
            <button onClick={() => { setHasUpdate(false); localStorage.setItem('icp_version', APP_VERSION); }}
              className="fixed bottom-[9.5rem] right-6 z-[1002] flex items-center gap-2 px-5 py-3 rounded-2xl bg-blue-600 text-white shadow-lg
                hover:bg-blue-700 hover:shadow-xl transition-all duration-200 hover:-translate-y-0.5 max-w-xs text-left"
              style={{ animation: 'fadeInUp 0.4s ease-out' }}>
              <div>
                <div className="flex items-center gap-2 mb-0.5">
                  <span className="text-base">🆕</span>
                  <span className="font-semibold text-sm">What's New</span>
                </div>
                <p className="text-xs text-white/80 leading-snug">{APP_UPDATE_NOTES}</p>
              </div>
              <span className="text-white/60 text-lg shrink-0 ml-1">✕</span>
            </button>
          )}

          {/* Floating My Trip Button */}
          <button onClick={() => setSidePanelOpen(true)} data-tour="my-trip-btn"
            className="fixed bottom-[5.5rem] right-6 z-[1001] flex items-center gap-2 px-5 py-3 rounded-full bg-teal text-white shadow-lg
              hover:bg-teal-dark hover:shadow-xl transition-all duration-200 hover:-translate-y-0.5">
            <span className="text-lg">📋</span>
            <span className="font-medium text-sm">My Trip</span>
            {(() => {
              const draft = getActiveDraft();
              const draftDays = draft ? (draft.days || {}) : {};
              const dc = draft ? (draft.dayCount || 1) : 1;
              let count = 0;
              for (let d = 1; d <= dc; d++) count += ((draftDays[d] && draftDays[d].stops) || []).length;
              return count > 0 ? (
                <span className="ml-0.5 w-5 h-5 rounded-full bg-white text-teal text-[11px] font-bold flex items-center justify-center">{count}</span>
              ) : null;
            })()}
          </button>

          {/* Floating Add Suggestion Button */}
          <button onClick={() => setShowSuggestionModal(true)} data-tour="add-suggestion-btn"
            className="fixed bottom-6 right-6 z-[1001] flex items-center gap-2 px-5 py-3 rounded-full bg-terracotta text-white shadow-lg
              hover:bg-terracotta-dark hover:shadow-xl transition-all duration-200 hover:-translate-y-0.5 group">
            <span className="text-lg">➕</span>
            <span className="font-medium text-sm">Add a Suggestion</span>
          </button>

          {/* Itinerary Side Panel */}
          <ItinerarySidePanel
            open={sidePanelOpen}
            onClose={() => setSidePanelOpen(false)}
            currentUser={currentUser}
            votes={votes}
            comments={comments}
            allCards={allCards}
            onVote={handleVote}
            onAddComment={handleAddComment}
            tripDrafts={tripDrafts}
            activeDraftId={getActiveDraftId()}
            onSetDraftDay={handleSetDraftDay}
            onUpdateDraftDayCount={handleUpdateDraftDayCount}
            onCreateDraft={handleCreateDraft}
            onSetActiveDraft={handleSetActiveDraft}
            onRenameDraft={handleRenameDraft}
            homeBase={homeBase}
          />

          <SuggestionModal currentUser={currentUser}
            onSubmit={handleAddSuggestion} onClose={() => setShowSuggestionModal(false)}
            open={showSuggestionModal} />

          {showTutorial && <TutorialModal onDismiss={handleDismissTutorial} />}

          <AnimatedModal open={showHomeBaseModal} onClose={() => setShowHomeBaseModal(false)}>
            <div className="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
              <h3 className="font-display text-xl font-bold mb-3">Set Home Base</h3>
              <p className="text-sm text-gray-500 mb-4">Day headers will show distance from this location.</p>
              <input type="text" defaultValue={homeBase} id="homeBaseInput"
                className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20 mb-4"
                placeholder="e.g., Reykjavik or Airbnb address" />
              <div className="flex gap-3">
                <button onClick={() => setShowHomeBaseModal(false)}
                  className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                <button onClick={() => handleSetHomeBase(document.getElementById('homeBaseInput').value.trim() || 'Reykjavik')}
                  className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-teal text-white hover:bg-teal-dark transition-colors">Save</button>
              </div>
            </div>
          </AnimatedModal>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
