    const GRADIENT_PALETTES = [
      ['#0c4a6e','#0284c7'], ['#134e4a','#0d9488'], ['#3b0764','#7c3aed'],
      ['#78350f','#d97706'], ['#1e3a5f','#3b82f6'], ['#701a75','#c026d3'],
      ['#14532d','#16a34a'], ['#7c2d12','#ea580c'], ['#1e1b4b','#6366f1'],
      ['#164e63','#06b6d4'], ['#4a1d96','#8b5cf6'], ['#92400e','#f59e0b'],
      ['#083344','#0891b2'], ['#365314','#65a30d'], ['#4c0519','#e11d48'],
    ];

    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }

    function getGradient(cardId, idx) {
      const h = hashStr(cardId + idx);
      const p = GRADIENT_PALETTES[h % GRADIENT_PALETTES.length];
      const angle = 135 + (idx * 40);
      return `linear-gradient(${angle}deg, ${p[0]} 0%, ${p[1]} 100%)`;
    }

    function getCostTierStyle(tier) {
      if (tier === 'free') return { bg: 'bg-green-100 text-green-800', dot: '#3B8A5A' };
      if (tier === 'moderate') return { bg: 'bg-amber-100 text-amber-800', dot: '#D4A530' };
      return { bg: 'bg-red-100 text-red-800', dot: '#C4544A' };
    }

    function getCostTierLabel(tier) {
      if (tier === 'free') return '🟢';
      if (tier === 'moderate') return '🟡';
      return '🔴';
    }

    function getTierBadge(tier) {
      if (tier === 'core') return { label: 'Core Stop', cls: 'bg-teal-50 text-teal border border-teal/20' };
      if (tier === 'must-decide') return { label: 'Must Decide', cls: 'bg-amber-50 text-amber-700 border border-amber-200' };
      return { label: 'Optional', cls: 'bg-gray-100 text-gray-600 border border-gray-200' };
    }

    function getCategoryIcon(cat) {
      if (cat === 'sightseeing') return '🏔️';
      if (cat === 'activity') return '🎯';
      if (cat === 'restaurant') return '🍽️';
      return '🏠';
    }

    function formatRelativeTime(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function getNetScore(cardId, votes) {
      let up = 0, down = 0;
      Object.entries(votes).forEach(([k, v]) => {
        if (k.startsWith(cardId + '__')) {
          if (v === 'up') up++;
          else if (v === 'down') down++;
        }
      });
      return { up, down, net: up - down };
    }

    function getVoters(cardId, votes) {
      const upVoters = [], downVoters = [];
      Object.entries(votes).forEach(([k, v]) => {
        if (k.startsWith(cardId + '__')) {
          const name = k.split('__').pop();
          if (v === 'up') upVoters.push(name);
          else if (v === 'down') downVoters.push(name);
        }
      });
      return { upVoters, downVoters };
    }

    function PasswordGate({ onSuccess }) {
      const [pw, setPw] = useState('');
      const [error, setError] = useState(false);
      const handleSubmit = (e) => {
        e.preventDefault();
        if (pw.toLowerCase().trim() === 'ingeborg') {
          onSuccess();
        } else {
          setError(true);
          setTimeout(() => setError(false), 1500);
        }
      };
      return (
        <div className="fixed inset-0 bg-[#FAFAF7] flex items-center justify-center z-50">
          <div className="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
            <span className="text-5xl block mb-4">🇮🇸</span>
            <h2 className="font-display text-3xl font-bold text-[#1A1A1A] mb-2">Iceland 2026</h2>
            <p className="text-gray-500 mb-6">Enter the family password to continue</p>
            <form onSubmit={handleSubmit}>
              <input type="password" value={pw} onChange={e => { setPw(e.target.value); setError(false); }}
                placeholder="Password"
                autoFocus
                className={`w-full px-4 py-3 rounded-xl text-center text-lg border-2 focus:outline-none transition-colors mb-4 ${
                  error ? 'border-red-400 bg-red-50' : 'border-gray-200 focus:border-teal focus:ring-2 focus:ring-teal/20'
                }`} />
              {error && <p className="text-red-500 text-sm mb-3">Incorrect password</p>}
              <button type="submit"
                className="w-full py-3 rounded-xl text-base font-semibold bg-teal text-white hover:bg-teal-dark transition-colors">
                Enter
              </button>
            </form>
          </div>
        </div>
      );
    }

    function UserSelector({ onSelect }) {
      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm">

    function ImageCarousel({ images, cardId }) {
      const realImages = IMAGE_URLS[cardId] || images;
      const [idx, setIdx] = useState(0);
      const [imgError, setImgError] = useState({});
      if (!realImages || realImages.length === 0) return null;
      const img = realImages[idx];
      const hasUrl = img.url && !imgError[idx];
      const prev = () => setIdx((idx - 1 + realImages.length) % realImages.length);
      const next = () => setIdx((idx + 1) % realImages.length);
      const handleKey = (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
      };

      return (
        <div className="relative h-48 overflow-hidden rounded-t-xl select-none outline-none"
          tabIndex={0} onKeyDown={handleKey}
          style={hasUrl ? {} : { background: getGradient(cardId, idx) }}>
          {hasUrl ? (
            <img src={img.url} alt={img.alt} className="w-full h-full object-cover"
              onError={() => setImgError(prev => ({...prev, [idx]: true}))} loading="lazy" />
          ) : (
            <div className="absolute inset-0 flex items-center justify-center p-6" style={{ background: getGradient(cardId, idx) }}>
              <p className="text-white/90 text-sm font-medium text-center leading-relaxed drop-shadow-lg">
                {img.alt}
              </p>
            </div>
          )}
          {realImages.length > 1 && (
            <>
              <div onClick={(e) => { e.stopPropagation(); prev(); }}
                className="absolute left-0 top-0 w-1/2 h-full cursor-pointer flex items-center justify-start pl-2 group">
                <span className="w-7 h-7 rounded-full bg-black/20 group-hover:bg-black/50 text-white flex items-center justify-center text-sm transition-colors">‹</span>
              </div>
              <div onClick={(e) => { e.stopPropagation(); next(); }}
                className="absolute right-0 top-0 w-1/2 h-full cursor-pointer flex items-center justify-end pr-2 group">
                <span className="w-7 h-7 rounded-full bg-black/20 group-hover:bg-black/50 text-white flex items-center justify-center text-sm transition-colors">›</span>
              </div>
              <div className="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1.5 pointer-events-none">
                {realImages.map((_, i) => (
                  <span key={i} className={`w-1.5 h-1.5 rounded-full transition-colors ${i === idx ? 'bg-white' : 'bg-white/40'}`} />
                ))}
              </div>
            </>
          )}
        </div>
      );

    function CommentSection({ cardId, currentUser, comments, onAddComment }) {
      const [expanded, setExpanded] = useState(false);
      const [text, setText] = useState('');
      const [replyTo, setReplyTo] = useState(null); // index of comment being replied to
      const [replyText, setReplyText] = useState('');
      const cardComments = comments[cardId] || [];

      const totalCount = cardComments.reduce((sum, c) => sum + 1 + (c.replies ? c.replies.length : 0), 0);

      const handleSubmit = () => {
        if (!text.trim()) return;
        onAddComment(cardId, { author: currentUser, text: text.trim(), timestamp: new Date().toISOString(), replies: [] });
        setText('');
      };

      const handleReply = (commentIdx) => {
        if (!replyText.trim()) return;
        const updated = [...cardComments];
        const comment = { ...updated[commentIdx] };
        comment.replies = [...(comment.replies || []), { author: currentUser, text: replyText.trim(), timestamp: new Date().toISOString() }];
        updated[commentIdx] = comment;
        onAddComment(cardId, null, updated);
        setReplyText('');
        setReplyTo(null);
      };

      return (
        <div className="pt-3 border-t border-gray-100">
          <button onClick={() => setExpanded(!expanded)}
            className="text-sm text-gray-500 hover:text-teal transition-colors flex items-center gap-1">
            💬 {totalCount} comment{totalCount !== 1 ? 's' : ''}
            <span className="text-xs">{expanded ? '▲' : '▼'}</span>
          </button>
          {expanded && (
            <div className="mt-2 space-y-2">
              {cardComments.map((c, i) => (
                <div key={i}>
                  <div className="bg-gray-50 rounded-lg px-3 py-2">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-teal">{c.author}</span>
                        <span className="text-[10px] text-gray-400">{formatRelativeTime(c.timestamp)}</span>
                      </div>
                      <button onClick={() => { setReplyTo(replyTo === i ? null : i); setReplyText(''); }}
                        className="text-[10px] text-gray-400 hover:text-teal transition-colors">
                        ↩ Reply
                      </button>
                    </div>
                    <p className="text-sm text-gray-700 mt-0.5">{c.text}</p>
                  </div>
                  {/* Replies */}
                  {c.replies && c.replies.length > 0 && (
                    <div className="ml-4 mt-1 space-y-1 border-l-2 border-teal-100 pl-3">
                      {c.replies.map((r, ri) => (
                        <div key={ri} className="bg-teal-50/50 rounded-lg px-3 py-1.5">
                          <div className="flex items-center gap-2">
                            <span className="text-[11px] font-semibold text-teal">{r.author}</span>
                            <span className="text-[10px] text-gray-400">{formatRelativeTime(r.timestamp)}</span>
                          </div>
                          <p className="text-[13px] text-gray-700 mt-0.5">{r.text}</p>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* Reply input */}
                  {replyTo === i && (
                    <div className="ml-4 mt-1 pl-3 border-l-2 border-teal-100">
                      <div className="flex gap-2">
                        <input type="text" value={replyText} onChange={e => setReplyText(e.target.value.slice(0, 280))}
                          onKeyDown={e => e.key === 'Enter' && handleReply(i)}
                          placeholder={`Reply to ${c.author}...`} autoFocus
                          className="flex-1 text-xs px-3 py-1.5 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20" />
                        <button onClick={() => handleReply(i)} disabled={!replyText.trim()}
                          className="px-3 py-1.5 text-xs font-medium rounded-lg bg-teal text-white hover:bg-teal-dark disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                          Reply
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <div className="flex gap-2 mt-2">
                <input type="text" value={text} onChange={e => setText(e.target.value.slice(0, 280))}
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                  placeholder="Add a comment..."
                  className="flex-1 text-sm px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20" />
                <button onClick={handleSubmit} disabled={!text.trim()}
                  className="px-4 py-2 text-sm font-medium rounded-lg bg-teal text-white hover:bg-teal-dark disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                  Post
                </button>
              </div>
              <div className="text-[10px] text-gray-400 text-right">{text.length}/280</div>
            </div>
          )}
        </div>
      );
    }

        <div className={`card-enter bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col

          {isSuggestion ? (
            <div className="h-32 bg-gradient-to-br from-teal-50 to-blue-50 flex flex-col items-center justify-center gap-2 relative">
              <span className="text-4xl">{getCategoryIcon(card.category)}</span>
              <span className="text-xs font-medium text-teal bg-white/80 px-3 py-1 rounded-full">
                💡 Suggested by {card.submittedBy}
              </span>
              {onDeleteSuggestion && card.submittedBy === currentUser && (
                <button onClick={() => onDeleteSuggestion(card.id)}
                  className="absolute top-2 right-2 w-6 h-6 rounded-full bg-red-100 hover:bg-red-200 text-red-600 flex items-center justify-center text-xs transition-colors"
                  title="Delete suggestion">✕</button>

                {getCostTierLabel(card.costTier)} {card.costDisplay}

            {card.driveFromPrevious && (

              <span>⏱ {card.timeNeeded}</span>

    function SuggestionModal({ currentUser, onSubmit, onClose }) {
      const [name, setName] = useState('');

      const [link, setLink] = useState('');

        e.preventDefault();
        if (!name.trim() || !description.trim()) return;
        onSubmit({
          id: 'user-suggestion-' + Date.now(),
          day: day,
          name: name.trim(),
          category,
          tier: 'optional',
          description: description.trim(),
          costPerPerson: 0,
          costDisplay: 'TBD',
          costTier: 'free',
          parkingCost: null,
          timeNeeded: 'TBD',
          bookAhead: null,
          bookAheadLabel: null,
          bookingUrl: null,
          bookingSiteName: null,
          driveFromPrevious: null,
          redditScore: null,
          bookSoonFlag: false,
          images: [],
          link: link.trim() || null,
          isUserSubmitted: true,
          submittedBy: currentUser,
          timestamp: new Date().toISOString(),
        });

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>
            <h2 className="font-display text-2xl font-bold mb-4">Add a Suggestion</h2>

                  className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20"
                  placeholder="e.g., Secret hot spring near Vík" required />

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Which day?</label>

                    className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal">
                    <option value={0}>Flexible / Any Day</option>
                    {DAYS.map(d => <option key={d.day} value={d.day}>Day {d.day} — {d.date}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                  <select value={category} onChange={e => setCategory(e.target.value)}
                    className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal">
                    <option value="sightseeing">🏔️ Sightseeing</option>
                    <option value="activity">🎯 Activity</option>
                    <option value="restaurant">🍽️ Restaurant</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Why should we do this? *</label>
                <textarea value={description} onChange={e => setDescription(e.target.value.slice(0, 280))}
                  className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20 h-20 resize-none"
                  placeholder="My coworker said this was the best part of their trip..." required />
                <span className="text-[10px] text-gray-400">{description.length}/280</span>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Link (optional)</label>
                <input type="url" value={link} onChange={e => setLink(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20"
                  placeholder="https://..." />
              </div>
              <div className="text-sm text-gray-500">
                Submitted by: <span className="font-semibold text-teal">{currentUser}</span>
              </div>
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onClose}
                  className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
                  Cancel
                </button>
                <button type="submit"
                  className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-teal text-white hover:bg-teal-dark transition-colors disabled:opacity-40"
                  disabled={!name.trim() || !description.trim()}>
                  Add Suggestion
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function LeaderboardView({ allCards, votes, currentUser, comments, onVote, onAddComment }) {
      const ranked = useMemo(() => {
        return allCards.map(card => ({
          ...card,
          ...getNetScore(card.id, votes),
          voters: getVoters(card.id, votes),
        })).sort((a, b) => b.net - a.net);
      }, [allCards, votes]);

      const favorites = ranked.filter(c => c.net >= 2);
      const mixed = ranked.filter(c => c.net >= 0 && c.net < 2);
      const skip = ranked.filter(c => c.net < 0);

      const estimatedCost = favorites.reduce((sum, c) => sum + (c.costPerPerson || 0), 0);

      const Section = ({ title, emoji, cards, bg }) => (
        cards.length > 0 && (
          <div className="mb-8">
            <h3 className="font-display text-xl font-bold mb-4">{emoji} {title}</h3>
            <div className="space-y-3">
              {cards.map(card => {
                const tierBadge = getTierBadge(card.tier);
                return (
                  <div key={card.id} className={`${bg} rounded-xl p-4 border border-gray-100`}>
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <h4 className="font-display font-bold text-[#1A1A1A]">{card.name}</h4>
                          <span className={`text-[10px] font-medium px-2 py-0.5 rounded-full ${tierBadge.cls}`}>{tierBadge.label}</span>
                          <span className="text-[10px] text-gray-400">{getCategoryIcon(card.category)} {card.category}</span>
                          {card.isUserSubmitted && <span className="text-[10px] text-teal">💡 by {card.submittedBy}</span>}
                        </div>
                        <div className="flex items-center gap-3 mt-1 text-xs text-gray-500">
                          <span>Day {card.day || '?'} · {card.costDisplay}</span>
                          <StarRating score={card.redditScore} />
                        </div>
                      </div>
                      <div className="text-right shrink-0">
                        <div className={`text-2xl font-bold ${card.net > 0 ? 'text-green-600' : card.net < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                          {card.net > 0 ? '+' : ''}{card.net}
                        </div>
                        <div className="text-[10px] text-gray-400">net score</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 mt-2 text-xs text-gray-500">
                      {card.voters.upVoters.length > 0 && (
                        <span>👍 {card.voters.upVoters.join(', ')}</span>
                      )}
                      {card.voters.downVoters.length > 0 && (
                        <span>👎 {card.voters.downVoters.join(', ')}</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )
      );

      return (
        <div className="max-w-4xl mx-auto px-6">
          <div className="bg-gradient-to-r from-teal to-teal-light rounded-2xl p-6 text-white mb-8">
            <h2 className="font-display text-2xl font-bold mb-1">Trip Leaderboard</h2>
            <p className="text-white/80 text-sm mb-3">Cards ranked by family consensus (upvotes minus downvotes)</p>
            <div className="bg-white/20 rounded-xl p-4">
              <p className="text-lg font-semibold">
                If you do everything with 2+ net votes: <span className="text-2xl font-bold">${Math.round(estimatedCost)}/person</span>
              </p>
              <p className="text-white/70 text-xs mt-1">
                Based on {favorites.length} activities/restaurants with group consensus
              </p>
            </div>
          </div>

          <Section title="Group Favorites" emoji="🏆" cards={favorites} bg="bg-green-50/50" />
          <Section title="Mixed Feelings" emoji="🤔" cards={mixed} bg="bg-white" />
          <Section title="Probably Skip" emoji="👋" cards={skip} bg="bg-red-50/30" />
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [votes, setVotes] = useState({});
      const [comments, setComments] = useState({});
      const [suggestions, setSuggestions] = useState([]);
      const [activeFilter, setActiveFilter] = useState('all');
      const [showSuggestionModal, setShowSuggestionModal] = useState(false);
      const [showTutorial, setShowTutorial] = useState(false);
      const [homeBase, setHomeBase] = useState('Reykjavik');
      const [showHomeBaseModal, setShowHomeBaseModal] = useState(false);
      const [activeDay, setActiveDay] = useState(1);
      const [showFloatingDay, setShowFloatingDay] = useState(false);
      const [advancedFilters, setAdvancedFilters] = useState({ category: 'all', cost: 'all', booking: 'all' });
      const [stickyHeight, setStickyHeight] = useState(100);
      const stickyRef = useRef(null);
      const [authenticated, setAuthenticated] = useState(() => localStorage.getItem('icp_auth') === 'true');
      const [hasUpdate, setHasUpdate] = useState(() => localStorage.getItem('icp_version') !== APP_VERSION);
      const [loading, setLoading] = useState(true);

      // Load personal data from localStorage, shared data from Firebase (real-time)
      useEffect(() => {
        // Personal (per-browser) — stays in localStorage
        const user = localStorage.getItem('icp_currentUser');
        if (user) setCurrentUser(user);

        const db = window.db;
        let loadCount = 0;
        const checkReady = () => { loadCount++; if (loadCount >= 4) setLoading(false); };

        // Votes — real-time listener
        db.ref('votes').on('value', (snap) => {
          setVotes(snap.val() || {});
          checkReady();
        });

        // Comments — real-time listener
        db.ref('comments').on('value', (snap) => {
          setComments(snap.val() || {});
          checkReady();
        });

        // Suggestions — real-time listener
        db.ref('suggestions').on('value', (snap) => {
          setSuggestions(snap.val() || []);
          checkReady();
        });

        // Home base — real-time listener
        db.ref('homeBase').on('value', (snap) => {
          if (snap.val()) setHomeBase(snap.val());
          checkReady();
        });

        // If no user stored, still stop loading
        if (!user) setLoading(false);

        return () => {
          db.ref('votes').off();
          db.ref('comments').off();
          db.ref('suggestions').off();
          db.ref('homeBase').off();
        };
      }, []);

      // Track sticky header height
      useEffect(() => {
        if (!stickyRef.current) return;
        const ro = new ResizeObserver(([entry]) => setStickyHeight(Math.ceil(entry.contentRect.height)));
        ro.observe(stickyRef.current);
        return () => ro.disconnect();
      }, [currentUser]);

      // Scroll tracking for day navigator
      useEffect(() => {
        const handleScroll = () => {
          let current = 1;
          let anyPinned = false;
          for (const d of DAYS) {
            const el = document.getElementById('day-section-' + d.day);
            if (el) {
              const rect = el.getBoundingClientRect();
              if (rect.top <= 150) { current = d.day; anyPinned = true; }
            }
          }
          setActiveDay(current);
          // Show floating bar once first day header scrolls above the sticky header
          const firstDay = document.getElementById('day-section-1');
          setShowFloatingDay(anyPinned && firstDay && firstDay.getBoundingClientRect().top < 0);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const handleSelectUser = (name) => {
        const wasNull = currentUser === null;
        setCurrentUser(name);
        localStorage.setItem('icp_currentUser', name);
        if (wasNull) {
          const seen = localStorage.getItem('icp_tutorialSeen');
          if (!seen) setShowTutorial(true);
        }
      };

      const handleDismissTutorial = () => {
        setShowTutorial(false);
        localStorage.setItem('icp_tutorialSeen', 'true');
      };

      const handleSetHomeBase = (value) => {
        setShowHomeBaseModal(false);
        window.db.ref('homeBase').set(value);
      };

      const handleVote = (cardId, voter, type) => {
        // Firebase keys can't contain . # $ [ ] so we use _ separator
        const fbKey = `${cardId}__${voter}`;
        if (type === null) {
          window.db.ref(`votes/${fbKey}`).remove();
        } else {
          window.db.ref(`votes/${fbKey}`).set(type);
        }
      };

      const handleAddComment = (cardId, comment, replaceAll) => {
        let updated;
        if (replaceAll) {
          updated = replaceAll;
        } else {
          const existing = comments[cardId] || [];
          updated = [...existing, comment];
        }
        window.db.ref(`comments/${cardId}`).set(updated);
      };

      const handleAddSuggestion = (suggestion) => {
        const updated = [...suggestions, suggestion];
        window.db.ref('suggestions').set(updated);
      };

      const handleDeleteSuggestion = (id) => {
        const updated = suggestions.filter(s => s.id !== id);
        window.db.ref('suggestions').set(updated);
      };

      // Combine pre-loaded cards with suggestions
      const allCards = useMemo(() => {
        return [...CARDS, ...suggestions.map(s => ({ ...s, isUserSubmitted: true }))];
      }, [suggestions]);

      // Filter cards
      const filteredCards = useMemo(() => {
        let cards = allCards;
        if (activeFilter === 'must-decide') cards = cards.filter(c => c.tier === 'must-decide');
        else if (activeFilter === 'restaurants') cards = cards.filter(c => c.category === 'restaurant');
        else if (activeFilter === 'suggestions') cards = cards.filter(c => c.isUserSubmitted);

        // Advanced filters
        if (advancedFilters.category !== 'all') {
          cards = cards.filter(c => c.category === advancedFilters.category);
        }
        if (advancedFilters.cost !== 'all') {
          cards = cards.filter(c => c.costTier === advancedFilters.cost);
        }
        if (advancedFilters.booking !== 'all') {
          if (advancedFilters.booking === 'none') {
            cards = cards.filter(c => !c.bookAhead);
          } else if (advancedFilters.booking === 'soon') {
            cards = cards.filter(c => c.bookAhead && !c.bookAhead.toLowerCase().includes('month'));
          } else if (advancedFilters.booking === 'months') {
            cards = cards.filter(c => c.bookAhead && c.bookAhead.toLowerCase().includes('month'));
          }
        }
        return cards;
      }, [allCards, activeFilter, advancedFilters]);

      // Group by day
      const cardsByDay = useMemo(() => {
        const grouped = {};
        filteredCards.forEach(c => {
          const d = c.day || 0;
          if (!grouped[d]) grouped[d] = [];
          grouped[d].push(c);
        });
        return grouped;
      }, [filteredCards]);

      const stats = useMemo(() => ({
        cards: allCards.length,
        votes: Object.keys(votes).length,
      }), [allCards, votes]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="text-4xl mb-4">🇮🇸</div>
              <p className="text-gray-500 font-medium">Loading trip planner...</p>
            </div>
          </div>
        );
      }

      if (!authenticated) {
        return <PasswordGate onSuccess={() => { setAuthenticated(true); localStorage.setItem('icp_auth', 'true'); }} />;
      }

      if (!currentUser) {
        return <UserSelector onSelect={handleSelectUser} />;
      }

      return (
        <div className="min-h-screen pb-24">
          <div ref={stickyRef} className="sticky top-0 z-40 bg-[#FAFAF7]/95 backdrop-blur-md shadow-sm">
            <Header currentUser={currentUser} onSwitchUser={handleSelectUser} stats={stats} onOpenHomeBase={() => setShowHomeBaseModal(true)} />
            <FilterBar activeFilter={activeFilter} onFilterChange={setActiveFilter}
              advancedFilters={advancedFilters} onAdvancedChange={setAdvancedFilters} />
          </div>
          <HeroSection cards={CARDS} votes={votes} suggestions={suggestions} />

          {activeFilter === 'all' && <DayNavigator activeDay={activeDay} />}
          {activeFilter === 'all' && showFloatingDay && (
            <FloatingDayBar dayData={DAYS.find(d => d.day === activeDay)} homeBase={homeBase} stickyTop={stickyHeight} />
          )}

          {activeFilter === 'leaderboard' ? (
            <LeaderboardView allCards={allCards} votes={votes} currentUser={currentUser}
              comments={comments} onVote={handleVote} onAddComment={handleAddComment} />
          ) : (
            <div className="max-w-7xl mx-auto px-6">
              {DAYS.map(dayData => {
                const dayCards = cardsByDay[dayData.day];
                if (!dayCards || dayCards.length === 0) {
                  if (activeFilter !== 'all') return null;
                  if (dayData.day === 8) {
                    return (
                      <div key={dayData.day}>
                        <DayHeader dayData={dayData} homeBase={homeBase} stickyTop={stickyHeight} />
                        <div className="bg-white rounded-xl border border-gray-100 p-8 text-center text-gray-400">
                          <span className="text-3xl mb-2 block">✈️</span>
                          <p className="font-medium">Departure day — safe travels!</p>
                          <p className="text-sm mt-1">Add a suggestion if there's something to squeeze in before the flight</p>
                        </div>
                      </div>
                    );
                  }
                  return null;
                }
                return (
                  <div key={dayData.day}>
                    <DayHeader dayData={dayData} homeBase={homeBase} stickyTop={stickyHeight} />
                    <div className="card-grid mb-8">
                      {dayCards.map((card, i) => (
                        <CardComponent key={card.id} card={card} currentUser={currentUser}
                          votes={votes} comments={comments} onVote={handleVote}
                          onAddComment={handleAddComment} delay={i}
                          onDeleteSuggestion={card.isUserSubmitted ? handleDeleteSuggestion : undefined} />
                      ))}
                    </div>
                  </div>
                );
              })}
              {/* Flexible day suggestions */}
              {cardsByDay[0] && cardsByDay[0].length > 0 && (
                <div>
                  <div className="mb-6 mt-10">
                    <h2 className="font-display text-2xl font-bold text-[#1A1A1A]">Flexible / Any Day</h2>
                  </div>
                  <div className="card-grid mb-8">
                    {cardsByDay[0].map((card, i) => (
                      <CardComponent key={card.id} card={card} currentUser={currentUser}
                        votes={votes} comments={comments} onVote={handleVote}
                        onAddComment={handleAddComment} delay={i}
                        onDeleteSuggestion={card.isUserSubmitted ? handleDeleteSuggestion : undefined} />
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Update notification */}
          {hasUpdate && (
            <button onClick={() => { setHasUpdate(false); localStorage.setItem('icp_version', APP_VERSION); }}
              className="fixed bottom-20 right-6 z-30 flex items-center gap-2 px-5 py-3 rounded-2xl bg-blue-600 text-white shadow-lg
                hover:bg-blue-700 hover:shadow-xl transition-all duration-200 hover:-translate-y-0.5 max-w-xs text-left"
              style={{ animation: 'fadeInUp 0.4s ease-out' }}>
              <div>
                <div className="flex items-center gap-2 mb-0.5">
                  <span className="text-base">🆕</span>
                  <span className="font-semibold text-sm">What's New</span>
                </div>
                <p className="text-xs text-white/80 leading-snug">{APP_UPDATE_NOTES}</p>
              </div>
              <span className="text-white/60 text-lg shrink-0 ml-1">✕</span>
            </button>
          )}

          {/* Floating Add Suggestion Button */}
          <button onClick={() => setShowSuggestionModal(true)}
            className="fixed bottom-6 right-6 z-30 flex items-center gap-2 px-5 py-3 rounded-full bg-terracotta text-white shadow-lg
              hover:bg-terracotta-dark hover:shadow-xl transition-all duration-200 hover:-translate-y-0.5 group">
            <span className="text-lg">➕</span>
            <span className="font-medium text-sm">Add a Suggestion</span>
          </button>

          {showSuggestionModal && (
            <SuggestionModal currentUser={currentUser}
              onSubmit={handleAddSuggestion} onClose={() => setShowSuggestionModal(false)} />
          )}

          {showTutorial && <TutorialModal onDismiss={handleDismissTutorial} />}

          {showHomeBaseModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm" onClick={() => setShowHomeBaseModal(false)}>
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                <h3 className="font-display text-xl font-bold mb-3">Set Home Base</h3>
                <p className="text-sm text-gray-500 mb-4">Day headers will show distance from this location.</p>
                <input type="text" defaultValue={homeBase} id="homeBaseInput"
                  className="w-full px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal/20 mb-4"
                  placeholder="e.g., Reykjavik or Airbnb address" />
                <div className="flex gap-3">
                  <button onClick={() => setShowHomeBaseModal(false)}
                    className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={() => handleSetHomeBase(document.getElementById('homeBaseInput').value.trim() || 'Reykjavik')}
                    className="flex-1 py-2.5 rounded-xl text-sm font-medium bg-teal text-white hover:bg-teal-dark transition-colors">Save</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
